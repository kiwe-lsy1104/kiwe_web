<!DOCTYPE html>
<html lang="ko">

<head>
    <script src="js/error_translator.js"></script>
    <meta charset="UTF-8">
    <base href="./">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https: 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://unpkg.com https://*.lucide.dev http://127.0.0.1:* http://localhost:*; img-src 'self' data: https:; font-src 'self' https: data:;">
    <title>일정 및 장비 관리 - KiWE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        window.onerror = function (msg, url, line, col, error) {
            console.error("Global Error:", msg, url, line);
            const root = document.getElementById('root');
            if (root && (root.innerHTML.includes('로딩') || root.innerHTML === '')) {
                root.innerHTML = `<div style="padding: 40px; text-align: center; font-family: sans-serif;">
                    <div style="color: #e11d48; font-size: 24px; font-weight: bold; mb: 10px;">시스템 로드 오류</div>
                    <div style="color: #64748b; margin-top: 10px;">화면을 불러오는 중 문제가 발생했습니다.<br/>잠시 후 다시 시도해주세요.</div>
                    <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 20px; background: #4f46e5; color: white; border: none; border-radius: 8px; cursor: pointer;">새로고침</button>
                </div>`;
            }
            return false;
        };
    </script>
    <style>
        .calendar-grid {
            display: grid;
            grid-template-columns: 2fr 3fr 3fr 3fr 3fr 3fr 2fr;
            gap: 1px;
            background-color: #cbd5e1;
        }

        .calendar-cell {
            background-color: white;
            height: 240px;
            /* Increased to 1.5x (160 * 1.5 = 240) */
            display: flex;
            flex-direction: column;
        }

        .month-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fadeIn {
            animation: fadeIn 0.15s ease-out forwards;
        }

        /* Smooth scroll for sidebar and calendar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 20px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
    <script type="module">
        import { checkAuth } from './js/auth.js';
        checkAuth();
    </script>
</head>

<body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen">
    <div id="root" class="flex-1 flex flex-col">
        <div
            style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 15px; font-family: sans-serif;">
            <div
                style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%; animation: spin 1s linear infinite;">
            </div>
            <div style="font-weight: bold; color: #475569;">시스템 로딩 중...</div>
            <style>
                @keyframes spin {
                    0% {
                        transform: rotate(0deg);
                    }

                    100% {
                        transform: rotate(360deg);
                    }
                }
            </style>
        </div>
    </div>

    <script type="module">
        const { useState, useEffect, useMemo, useRef } = React;
        const e = React.createElement;
        let supabase;
        try {
            supabase = window.supabase.createClient('https://jztrnwchgxymknjvsbkl.supabase.co', 'sb_publishable_Z8oriOCik8fZlnAMgznUMg_IhmmFQ33');
        } catch (err) {
            console.error("Supabase Init Error:", err);
        }

        const formatLocalDate = (date) => {
            if (!(date instanceof Date) || isNaN(date)) return '';
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        };

        // ==========================================
        // Sub-Components
        // ==========================================

        const MonthSelector = ({ currentMonth, onSelect }) => {
            const months = Array.from({ length: 12 }, (_, i) => i + 1);
            return e('div', { className: "absolute top-12 left-0 z-20 bg-white shadow-xl rounded-xl p-4 border border-slate-200 w-64 grid grid-cols-4 gap-2 animate-fadeIn" },
                months.map(m => e('button', {
                    key: m,
                    onClick: () => onSelect(m),
                    className: `p-2 rounded-lg text-sm font-bold ${currentMonth === m ? 'bg-indigo-600 text-white' : 'bg-slate-50 text-slate-600 hover:bg-slate-100'}`
                }, `${m}월`))
            );
        };

        const MultiUserSelect = ({ users, selected, onChange }) => {
            const [localUsers, setLocalUsers] = useState(users);
            const [isOpen, setIsOpen] = useState(false);

            const selectedNames = selected ? selected.split(',').map(s => s.trim()).filter(Boolean) : [];

            const toggleUser = (name) => {
                let newSelected;
                if (selectedNames.includes(name)) {
                    newSelected = selectedNames.filter(n => n !== name);
                } else {
                    newSelected = [...selectedNames, name];
                }
                onChange(newSelected.join(', '));
            };

            return e('div', { className: "relative space-y-2" },
                e('div', { className: "flex flex-wrap gap-2 p-2 bg-slate-50 border border-slate-200 rounded-xl min-h-[50px] items-center" },
                    selectedNames.map(name =>
                        e('span', { key: name, className: "bg-indigo-100 text-indigo-700 px-2 py-1 rounded-lg text-xs font-bold flex items-center gap-1" },
                            name,
                            e('button', { type: 'button', onClick: () => toggleUser(name), className: "hover:text-indigo-900" }, e('i', { 'data-lucide': "x", className: "w-3 h-3" }))
                        )
                    ),
                    e('button', { type: 'button', onClick: () => setIsOpen(!isOpen), className: "px-2 py-1 text-xs font-bold text-slate-400 border border-dashed border-slate-300 rounded hover:bg-white hover:text-indigo-600 transition" }, "+ 추가")
                ),
                isOpen && e('div', { className: "absolute top-full left-0 w-full bg-white border border-slate-200 rounded-xl shadow-xl z-50 max-h-48 overflow-y-auto p-2 grid grid-cols-2 gap-1 animate-fadeIn" },
                    localUsers.map(u =>
                        e('button', {
                            key: u.user_id,
                            type: 'button',
                            onClick: () => toggleUser(u.user_name),
                            className: `text-left px-3 py-2 rounded-lg text-xs font-bold ${selectedNames.includes(u.user_name) ? 'bg-indigo-50 text-indigo-700' : 'hover:bg-slate-50 text-slate-600'}`
                        }, u.user_name)
                    )
                ),
                isOpen && e('div', { className: "fixed inset-0 z-40", onClick: () => setIsOpen(false) })
            );
        };

        const EquipmentCard = ({ equip, usage }) => {
            const limit = Number(equip.limit_count) || 0;
            const remaining = Math.max(0, limit - usage);

            // Icon Mapping
            const getIcon = (name) => {
                if (name.includes('소음')) return 'mic';
                if (name.includes('WBGT')) return 'thermometer-sun';
                if (name.includes('Air')) return 'wind';
                if (name.includes('Low') || name.includes('유량')) return 'gauge';
                if (name.includes('Quad')) return 'layout-grid';
                return 'box';
            };

            const isSoldOut = equip.eq_name === 'WBGT' ? remaining === 0 : remaining <= 4;
            const percentage = limit > 0 ? Math.min(100, Math.round((usage / limit) * 100)) : 0;

            // Pastel Theme Colors (Randomly assigned or fixed based on type would be ideal, using fixed generic for now or indexed)
            // Using a soft slate/indigo base for normal, red for alert

            return e('div', { className: `relative overflow-hidden rounded-lg transition-all duration-300 group ${isSoldOut ? 'bg-red-50 border border-red-200' : 'bg-white border border-slate-100 hover:border-indigo-200 hover:shadow-md'}` },
                // Background Pattern (Optional decoration)
                !isSoldOut && e('div', { className: "absolute top-0 right-0 p-1.5 opacity-5" },
                    e('i', { 'data-lucide': getIcon(equip.eq_name), className: "w-6 h-6" })
                ),

                e('div', { className: "p-2 space-y-2 relative z-10" },
                    // Header
                    e('div', { className: "flex justify-between items-start" },
                        e('div', { className: "flex flex-col" },
                            e('span', { className: "text-[8px] font-bold text-slate-400 uppercase tracking-wide mb-0.5" }, "EQUIPMENT"),
                            e('h4', { className: `text-[11px] font-black ${isSoldOut ? 'text-red-600' : 'text-slate-700'} flex items-center gap-1` },
                                e('i', { 'data-lucide': getIcon(equip.eq_name), className: "w-3 h-3" }),
                                equip.eq_name
                            )
                        ),
                        isSoldOut && e('div', { className: "bg-red-100 text-red-600 text-[8px] font-black px-1.5 py-0.5 rounded-full flex items-center gap-0.5" },
                            e('i', { 'data-lucide': "alert-circle", className: "w-2.5 h-2.5" }), "품절임박"
                        )
                    ),

                    // Grid Metrics
                    e('div', { className: "grid grid-cols-3 gap-1 py-1.5 bg-white/50 rounded-lg border border-slate-50/50 backdrop-blur-sm" },
                        // Total
                        e('div', { className: "flex flex-col items-center border-r border-slate-100" },
                            e('span', { className: "text-[9px] text-black font-bold mb-0.5" }, "보유"),
                            e('span', { className: "text-sm font-black text-slate-600" }, limit)
                        ),
                        // Used
                        e('div', { className: "flex flex-col items-center border-r border-slate-100" },
                            e('span', { className: "text-[9px] text-black font-bold mb-0.5" }, "사용"),
                            e('span', { className: `text-sm font-black ${usage > 0 ? (isSoldOut ? 'text-red-500' : 'text-indigo-600') : 'text-slate-300'}` }, usage)
                        ),
                        // Remaining
                        e('div', { className: "flex flex-col items-center" },
                            e('span', { className: "text-[9px] text-black font-bold mb-0.5" }, "잔여"),
                            e('span', { className: `text-sm font-black ${isSoldOut ? 'text-red-600' : 'text-emerald-500'}` }, remaining)
                        )
                    )
                )
            );
        };

        const EquipmentInputCard = ({ equip, dailyUsage, myUsage, onChange }) => {
            const limit = Number(equip.limit_count) || 0;
            const available = Math.max(0, limit - dailyUsage);
            const remainingAfterMyInput = Math.max(0, available - myUsage);

            // Icon Mapping (Reused)
            const getIcon = (name) => {
                if (name.includes('소음')) return 'mic';
                if (name.includes('WBGT')) return 'thermometer-sun';
                if (name.includes('Air')) return 'wind';
                if (name.includes('Low') || name.includes('유량')) return 'gauge';
                if (name.includes('Quad')) return 'layout-grid';
                return 'box';
            };

            const isLowStock = equip.eq_name === 'WBGT' ? remainingAfterMyInput === 0 : remainingAfterMyInput <= 4;

            return e('div', { className: `bg-white border rounded-xl p-3 shadow-sm hover:border-indigo-300 transition-colors ${isLowStock ? 'border-red-200 bg-red-50/30' : 'border-slate-200'}` },
                // Header
                e('div', { className: "flex justify-between items-center mb-2" },
                    e('div', { className: "flex items-center gap-1.5" },
                        e('div', { className: `p-1.5 rounded-lg ${isLowStock ? 'bg-red-100 text-red-500' : 'bg-slate-50 text-slate-500'}` },
                            e('i', { 'data-lucide': getIcon(equip.eq_name), className: "w-4 h-4" })
                        ),
                        e('span', { className: `text-sm font-black ${isLowStock ? 'text-red-700' : 'text-slate-700'}` }, equip.eq_name)
                    ),
                    remainingAfterMyInput <= 0 && e('span', { className: "text-[10px] font-bold text-red-500 bg-red-50 px-2 py-0.5 rounded-full animate-pulse" }, "매진")
                ),

                // Metrics Grid
                e('div', { className: "grid grid-cols-3 gap-1" },
                    // Total
                    e('div', { className: "flex flex-col items-center justify-center p-1.5 bg-white/50 rounded-lg border border-slate-100" },
                        e('span', { className: "text-[10px] font-bold text-slate-400" }, "보유"),
                        e('span', { className: "text-xs font-black text-slate-600" }, limit)
                    ),
                    // Remaining (Closing Balance)
                    e('div', { className: "flex flex-col items-center justify-center p-1.5 bg-white/50 rounded-lg border border-slate-100" },
                        e('span', { className: "text-[10px] font-bold text-slate-400" }, "잔여"),
                        e('span', { className: `text-xs font-black ${remainingAfterMyInput === 0 ? 'text-red-500' : (isLowStock ? 'text-amber-500' : 'text-emerald-500')}` }, remainingAfterMyInput)
                    ),
                    // Input (My Usage)
                    e('div', { className: "relative" },
                        e('input', {
                            type: "number",
                            min: "0",
                            max: available,
                            value: myUsage === 0 ? '' : myUsage,
                            placeholder: "0",
                            onChange: (e) => {
                                const val = parseInt(e.target.value) || 0;
                                onChange(Math.max(0, val));
                            },
                            className: "w-full h-full text-center font-black text-indigo-600 bg-indigo-50 border-2 border-indigo-100 rounded-lg outline-none focus:border-indigo-500 focus:bg-white transition-colors p-0 text-sm"
                        }),
                        e('span', { className: "absolute top-0.5 right-1 pointer-events-none text-[8px] font-bold text-indigo-300" }, "신청")
                    )
                )
            );
        };

        // ==========================================
        // Main Application
        // ==========================================
        function CalendarApp() {
            const [users, setUsers] = useState([]);
            const [currentDate, setCurrentDate] = useState(new Date());
            const [selectedDate, setSelectedDate] = useState(formatLocalDate(new Date()));
            const [showMonthSelector, setShowMonthSelector] = useState(false);
            const [events, setEvents] = useState([]);
            const [equipments, setEquipments] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [modalData, setModalData] = useState({
                id: null,
                sche_date: '',
                com_name: '',
                inspector: '',
                activity_type: '정기측정',
                equipment_used: {}
            });
            const [companyResults, setCompanyResults] = useState([]);
            const [showCompanyDropdown, setShowCompanyDropdown] = useState(false);
            const searchTimeoutRef = useRef(null);

            const handleCompanySearch = (val) => {
                setModalData(prev => ({ ...prev, com_name: val }));
                if(searchTimeoutRef.current) clearTimeout(searchTimeoutRef.current);
                
                if (!val || val.length === 0) {
                    setCompanyResults([]);
                    setShowCompanyDropdown(false);
                    return;
                }
                
                searchTimeoutRef.current = setTimeout(async () => {
                    const { data } = await supabase.from('kiwe_companies').select('com_name').ilike('com_name', `%${val}%`).limit(15);
                    if (data && data.length > 0) {
                        setCompanyResults(data);
                        setShowCompanyDropdown(true);
                    } else {
                        setCompanyResults([]);
                        setShowCompanyDropdown(false);
                    }
                }, 300);
            };

            const selectCompany = (name) => {
                setModalData(prev => ({ ...prev, com_name: name }));
                setCompanyResults([]);
                setShowCompanyDropdown(false);
            };

            // Color Palette for Users: Red, Yellow(Amber), Green(Emerald), Blue, Purple
            const colorPalette = [
                { bg: 'bg-red-50', border: 'border-red-200', text: 'text-red-700', hex: 'bg-red-500' },
                { bg: 'bg-amber-50', border: 'border-amber-200', text: 'text-amber-700', hex: 'bg-amber-500' },
                { bg: 'bg-emerald-50', border: 'border-emerald-200', text: 'text-emerald-700', hex: 'bg-emerald-500' },
                { bg: 'bg-blue-50', border: 'border-blue-200', text: 'text-blue-700', hex: 'bg-blue-500' },
                { bg: 'bg-purple-50', border: 'border-purple-200', text: 'text-purple-700', hex: 'bg-purple-500' }
            ];

            const getUserColorObj = (inspectorName) => {
                if (!inspectorName) return { bg: 'bg-slate-50', border: 'border-slate-200', text: 'text-slate-600', hex: 'bg-slate-400' };
                const idx = users.findIndex(u => u.user_name === inspectorName.split(',')[0].trim());
                if (idx === -1) return { bg: 'bg-slate-50', border: 'border-slate-200', text: 'text-slate-600', hex: 'bg-slate-400' };
                return colorPalette[idx % colorPalette.length];
            };

            const getUserColorClass = (inspectorName) => {
                const obj = getUserColorObj(inspectorName);
                return `${obj.bg} ${obj.border} ${obj.text}`;
            };

            useEffect(() => { fetchEquipments(); fetchUsers(); }, []);
            useEffect(() => { fetchEvents(); }, [currentDate]);
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [selectedDate, events, equipments, isModalOpen]);

            const fetchEquipments = async () => {
                const { data } = await supabase.from('kiwe_equipments').select('id, eq_name, equipment_type, limit_count').order('equipment_type').order('eq_name');
                setEquipments(data || []);
            };

            const fetchUsers = async () => {
                const { data } = await supabase.from('kiwe_users').select('user_name, user_id').order('user_name');
                setUsers(data || []);
            };

            const fetchEvents = async () => {
                const y = currentDate.getFullYear();
                const m = currentDate.getMonth() + 1;
                const prefix = `${y}-${String(m).padStart(2, '0')}`;
                const { data } = await supabase.from('kiwe_schedule').select('*').ilike('sche_date', `${prefix}%`);
                if (data) setEvents(data);
            };

            useEffect(() => {
                const handleEsc = (ev) => {
                    if (ev.key === 'Escape') setIsModalOpen(false);
                };
                window.addEventListener('keydown', handleEsc);
                return () => window.removeEventListener('keydown', handleEsc);
            }, []);

            const saveEvent = async (ev) => {
                ev.preventDefault();
                const payload = { ...modalData };
                if (payload.com_name) {
                    payload.com_name = payload.com_name.trim();
                }
                // CRITICAL: Always remove id from payload to prevent UPDATE error
                delete payload.id;

                const { error } = modalData.id
                    ? await supabase.from('kiwe_schedule').update(payload).eq('id', modalData.id)
                    : await supabase.from('kiwe_schedule').insert([payload]);

                if (error) {
                    alert('저장 실패: ' + error.message);
                } else {
                    setIsModalOpen(false);
                    fetchEvents();
                }
            };

            const deleteEvent = async (id) => {
                if (!confirm('일정을 삭제하시겠습니까?')) return;
                const { error } = await supabase.from('kiwe_schedule').delete().eq('id', id);
                if (!error) fetchEvents();
            };

            const cloneEvent = (evt) => {
                const date = new Date(evt.sche_date);
                date.setDate(date.getDate() + 1);
                const nextDay = formatLocalDate(date);

                setModalData({
                    ...evt,
                    id: null, // New entry
                    sche_date: nextDay
                });
                setIsModalOpen(true);
            };

            const getDaysInMonth = () => {
                const y = currentDate.getFullYear();
                const m = currentDate.getMonth();
                const firstDay = new Date(y, m, 1).getDay();
                const daysInMonth = new Date(y, m + 1, 0).getDate();
                const days = [];
                for (let i = 0; i < firstDay; i++) days.push(null);
                for (let i = 1; i <= daysInMonth; i++) days.push(new Date(y, m, i));
                return days;
            };

            const getCurrentDayUsage = () => {
                const dailyEvents = events.filter(e => e.sche_date === selectedDate);
                const usageMap = {};
                dailyEvents.forEach(evt => {
                    const usage = typeof evt.equipment_used === 'string' ? JSON.parse(evt.equipment_used) : (evt.equipment_used || {});
                    Object.entries(usage).forEach(([eid, count]) => {
                        if (typeof count === 'number' && !isNaN(count)) {
                            usageMap[eid] = (usageMap[eid] || 0) + count;
                        }
                    });
                });
                return usageMap;
            };

            // 장비를 equipment_type에 따라 그룹화하여 카드로 변환
            const getGroupedEquipmentCards = () => {
                const grouped = {};
                const individualCards = []; // 기타 타입은 개별 카드

                equipments.forEach(eq => {
                    const type = eq.equipment_type || '기타';

                    if (type === '유량보정기' || type === '소음보정기') return; // Exclude calibrators from this view

                    if (type === '기타') {
                        // 기타 타입은 각각 개별 카드로 표시
                        individualCards.push({
                            id: eq.id,
                            eq_name: eq.eq_name,
                            equipment_type: type,
                            limit_count: eq.limit_count,
                            isGroup: false
                        });
                    } else {
                        // 저유량, 고유량, 소음기, 7L, 길에어는 타입별로 합산
                        if (!grouped[type]) {
                            grouped[type] = {
                                id: type, // 그룹 ID는 타입명
                                eq_name: type,
                                equipment_type: type,
                                limit_count: 0,
                                isGroup: true,
                                equipmentIds: [] // 포함된 장비 ID 목록
                            };
                        }
                        grouped[type].limit_count += eq.limit_count;
                        grouped[type].equipmentIds.push(eq.id);
                    }
                });

                return { grouped, individualCards };
            };

            // 그룹 또는 개별 카드의 사용량 계산
            const getCardUsage = (card) => {
                if (card.isGroup) {
                    // 그룹 카드: 해당 타입의 모든 장비 사용량 합산
                    return card.equipmentIds.reduce((sum, eid) => sum + (currentUsage[eid] || 0), 0);
                } else {
                    // 개별 카드: 해당 장비의 사용량
                    return currentUsage[card.id] || 0;
                }
            };

            const days = getDaysInMonth();
            const currentUsage = getCurrentDayUsage();
            const { grouped, individualCards } = getGroupedEquipmentCards();

            return e('div', { className: "flex flex-col min-h-screen bg-slate-50" },
                e('header', { className: "bg-white border-b border-slate-200 h-16 flex items-center justify-between px-6 sticky top-0 z-20 shrink-0" },
                    e('div', { className: "flex items-center gap-2" },
                        e('a', { href: "main.html", className: "flex items-center gap-2 text-slate-500 hover:text-blue-600 font-bold transition-colors" },
