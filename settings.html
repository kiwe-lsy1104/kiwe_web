<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <base href="./">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https: 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://unpkg.com https://*.lucide.dev http://127.0.0.1:* http://localhost:*; img-src 'self' data: https:; font-src 'self' https: data:;">
    <title>평가원 관리 및 설정 - KiWE 측정 관리</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        window.onerror = function (msg, url, line, col, error) {
            console.error("Global Error:", msg, url, line);
            const root = document.getElementById('root');
            if (root && (root.innerHTML.includes('로딩') || root.innerHTML === '')) {
                root.innerHTML = `<div style="padding: 40px; text-align: center; font-family: sans-serif;">
                    <div style="color: #e11d48; font-size: 24px; font-weight: bold; mb: 10px;">시스템 로드 오류</div>
                    <div style="color: #64748b; margin-top: 10px;">화면을 불러오는 중 문제가 발생했습니다.<br/>잠시 후 다시 시도해주세요.</div>
                    <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 20px; background: #4f46e5; color: white; border: none; border-radius: 8px; cursor: pointer;">새로고침</button>
                </div>`;
            }
            return false;
        };
    </script>
    <script src="js/error_translator.js"></script>
    <script type="module">
        import { checkAuth } from './js/auth.js';
        checkAuth();
    </script>
</head>

<body class="bg-gray-100 min-h-screen text-slate-800 font-sans">
    <div id="root">
        <div
            style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 15px; font-family: sans-serif;">
            <div
                style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%; animation: spin 1s linear infinite;">
            </div>
            <div style="font-weight: bold; color: #475569;">시스템 로딩 중...</div>
            <style>
                @keyframes spin {
                    0% {
                        transform: rotate(0deg);
                    }

                    100% {
                        transform: rotate(360deg);
                    }
                }
            </style>
        </div>
    </div>

    <script src="js/error_translator.js"></script>
    <script type="module">
        const { useState, useEffect, useMemo } = React;
        const e = React.createElement;
        import * as XLSX from 'https://esm.sh/xlsx@0.18.5';
        import * as VehicleAPI from './js/vehicle.js';
        import HazardManagement from './js/hazard_management.js';

        let supabase;
        try {
            supabase = window.supabase.createClient('https://jztrnwchgxymknjvsbkl.supabase.co', 'sb_publishable_Z8oriOCik8fZlnAMgznUMg_IhmmFQ33');
        } catch (err) {
            console.error("Supabase Init Error:", err);
        }

        // ==== TAB 1: 사용자 관리 ====
        function UserTab() {
            const [users, setUsers] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({ user_id: '', user_pw: '', user_name: '', role: '일반', department: '', position: '', job_title: '', join_date: '', resign_date: '' });
            const [isEdit, setIsEdit] = useState(false);

            useEffect(() => { fetchUsers(); }, []);

            useEffect(() => {
                const handleEsc = (ev) => {
                    if (ev.key === 'Escape') setIsModalOpen(false);
                };
                window.addEventListener('keydown', handleEsc);
                return () => window.removeEventListener('keydown', handleEsc);
            }, []);

            const fetchUsers = async () => {
                const { data } = await supabase.from('kiwe_users').select('*').order('user_id');
                setUsers(data || []);
            };

            const openNew = async () => {
                let nextId = 'VIP-0001';
                try {
                    const { data } = await supabase.from('kiwe_users').select('user_id').order('user_id', { ascending: false }).limit(1);
                    if (data && data.length > 0) {
                        const lastId = data[0].user_id;
                        if (lastId && lastId.startsWith('VIP-')) {
                            const num = parseInt(lastId.split('-')[1]);
                            nextId = `VIP-${String(num + 1).padStart(4, '0')}`;
                        }
                    }
                } catch (err) {
                    console.error("ID Generation Error", err);
                }

                setFormData({ user_id: nextId, user_pw: '', user_name: '', role: '일반', department: '', position: '', job_title: '', join_date: '', resign_date: '' });
                setIsEdit(false);
                setIsModalOpen(true);
            };

            const openEdit = (u) => {
                setFormData(u);
                setIsEdit(true);
                setIsModalOpen(true);
            };

            const closeModal = () => setIsModalOpen(false);

            const handleSave = async (ev) => {
                ev.preventDefault();
                try {
                    if (!isEdit) {
                        const { error } = await supabase.from('kiwe_users').insert([formData]);
                        if (error) throw error;
                    } else {
                        const { error } = await supabase.from('kiwe_users').update(formData).eq('user_id', formData.user_id);
                        if (error) throw error;
                    }
                    closeModal();
                    fetchUsers();
                } catch (err) { alert('오류: ' + err.message); }
            };

            const handleDelete = async () => {
                if (confirm('해당 사용자를 [퇴사] 처리 하시겠습니까? 로그인이 차단됩니다.')) {
                    const today = new Date().toISOString().split('T')[0];
                    const { error } = await supabase.from('kiwe_users').update({ resign_date: today }).eq('user_id', formData.user_id);
                    if (error) throw error;
                    closeModal();
                    fetchUsers();
                }
            };

            return e('div', { className: "max-w-7xl mx-auto space-y-6" },
                e('div', { className: "flex justify-between items-center px-2" },
                    e('div', { className: "space-y-1" },
                        e('h2', { className: "text-2xl font-black text-slate-800" }, "사용자 관리"),
                        e('p', { className: "text-slate-500 font-medium" }, "시스템 접속 권한 및 사용자 정보를 관리합니다.")
                    ),
                    e('button', { onClick: openNew, className: "bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg transition-all transform hover:-translate-y-1" }, "신규 사용자 등록")
                ),
                e('div', { className: "bg-white rounded-2xl shadow-lg border border-slate-100 overflow-hidden" },
                    e('table', { className: "w-full text-left" },
                        e('thead', { className: "bg-slate-50 border-b border-slate-200 text-slate-500 font-bold uppercase tracking-wider text-sm" },
                            e('tr', null,
                                e('th', { className: "px-8 py-4" }, "사용자 ID"),
                                e('th', { className: "px-8 py-4" }, "성명"),
                                e('th', { className: "px-8 py-4" }, "부서 / 직책"),
                                e('th', { className: "px-8 py-4" }, "직무"),
                                e('th', { className: "px-8 py-4" }, "권한"),
                                e('th', { className: "px-8 py-4" }, "입사일"),
                                e('th', { className: "px-8 py-4" }, "상태"),
                                e('th', { className: "px-8 py-4 text-right" }, "관리")
                            )
                        ),
                        e('tbody', { className: "divide-y divide-slate-100 text-base" },
                            users.map((u, idx) => e('tr', { key: idx, className: "hover:bg-blue-50/50 transition-colors" },
                                e('td', { className: "px-8 py-4 font-mono text-slate-600 font-bold" }, u.user_id),
                                e('td', { className: "px-8 py-4 font-bold text-slate-800 text-lg" }, u.user_name),
                                e('td', { className: "px-8 py-4 text-slate-600 text-sm" }, `${u.department} ${u.position ? `/ ${u.position}` : ''}`),
                                e('td', { className: "px-8 py-4 text-slate-600 text-sm" }, u.job_title),
                                e('td', { className: "px-8 py-4 font-medium text-slate-600" }, u.role),
                                e('td', { className: "px-8 py-4 text-slate-500 text-sm" }, u.join_date || '-'),
                                e('td', { className: "px-8 py-4 font-medium text-slate-600" },
                                    e('span', { className: `px-3 py-1 rounded-lg text-sm font-bold ${!u.resign_date ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}` },
                                        u.resign_date ? `퇴사(${u.resign_date})` : '재직'
                                    )
                                ),
                                e('td', { className: "px-8 py-4 text-right" },
                                    e('button', { onClick: () => openEdit(u), className: "bg-slate-100 text-slate-700 font-bold px-6 py-2 rounded-lg hover:bg-slate-200 transition-colors text-sm" }, "관리")
                                )
                            ))
                        )
                    )
                ),
                isModalOpen && e('div', { className: "fixed inset-0 bg-slate-900/70 backdrop-blur-sm flex items-center justify-center z-50 p-6" },
                    e('div', { className: "bg-white rounded-3xl shadow-2xl w-full max-w-lg overflow-hidden animate-slideUp" },
                        e('div', { className: "p-8 border-b bg-slate-50" },
                            e('h3', { className: "text-2xl font-black text-slate-800" }, isEdit ? '사용자 정보 수정' : '신규 사용자 등록'),
                            e('p', { className: "text-slate-500 mt-1 font-medium" }, "사용자의 로그인 정보 및 권한을 설정합니다.")
                        ),
                        e('form', { onSubmit: handleSave, className: "p-8 space-y-6" },
                            e('div', { className: "space-y-2" },
                                e('label', { className: "text-sm font-bold text-slate-500" }, "사용자 ID (자동생성)"),
                                e('input', { readOnly: true, value: formData.user_id, className: "w-full p-4 border rounded-xl outline-none bg-slate-100 text-slate-500 font-bold cursor-not-allowed" })
                            ),
                            e('div', { className: "space-y-2" },
                                e('label', { className: "text-sm font-bold text-slate-500" }, "비밀번호"),
                                e('input', { required: true, type: "text", value: formData.user_pw, onChange: (ev) => setFormData({ ...formData, user_pw: ev.target.value }), className: "w-full p-4 border rounded-xl outline-none focus:border-blue-500 bg-slate-50 focus:bg-white transition-colors font-bold", placeholder: "비밀번호 입력" })
                            ),
                            e('div', { className: "space-y-2" },
                                e('label', { className: "text-sm font-bold text-slate-500" }, "성명"),
                                e('input', { required: true, value: formData.user_name, onChange: (ev) => setFormData({ ...formData, user_name: ev.target.value }), className: "w-full p-4 border rounded-xl outline-none focus:border-blue-500 bg-slate-50 focus:bg-white transition-colors font-bold", placeholder: "성명 입력" })
                            ),
                            e('div', { className: "grid grid-cols-3 gap-4" },
                                e('div', { className: "space-y-2" },
                                    e('label', { className: "text-sm font-bold text-slate-500" }, "부서"),
                                    e('input', { value: formData.department, onChange: (ev) => setFormData({ ...formData, department: ev.target.value }), className: "w-full p-4 border rounded-xl outline-none focus:border-blue-500 bg-slate-50 focus:bg-white transition-colors font-bold" })
                                ),
                                e('div', { className: "space-y-2" },
                                    e('label', { className: "text-sm font-bold text-slate-500" }, "직책"),
                                    e('input', { value: formData.position, onChange: (ev) => setFormData({ ...formData, position: ev.target.value }), className: "w-full p-4 border rounded-xl outline-none focus:border-blue-500 bg-slate-50 focus:bg-white transition-colors font-bold" })
                                ),
                                e('div', { className: "space-y-2" },
                                    e('label', { className: "text-sm font-bold text-slate-500" }, "직무"),
                                    e('input', { value: formData.job_title, onChange: (ev) => setFormData({ ...formData, job_title: ev.target.value }), className: "w-full p-4 border rounded-xl outline-none focus:border-blue-500 bg-slate-50 focus:bg-white transition-colors font-bold" })
                                )
                            ),
                            e('div', { className: "grid grid-cols-2 gap-6" },
                                e('div', { className: "space-y-2" },
                                    e('label', { className: "text-sm font-bold text-slate-500" }, "권한"),
                                    e('input', { value: formData.role, onChange: (ev) => setFormData({ ...formData, role: ev.target.value }), className: "w-full p-4 border rounded-xl outline-none focus:border-blue-500 bg-slate-50 focus:bg-white transition-colors font-bold", placeholder: "예: 관리자" })
                                ),
                                e('div', { className: "space-y-2" },
                                    e('label', { className: "text-sm font-bold text-slate-500" }, "입사일자"),
                                    e('input', { type: "date", value: formData.join_date, onChange: (ev) => setFormData({ ...formData, join_date: ev.target.value }), className: "w-full p-4 border rounded-xl outline-none focus:border-blue-500 bg-slate-50 focus:bg-white transition-colors font-bold" })
                                )
                            ),
                            e('div', { className: "space-y-2" },
                                e('label', { className: "text-sm font-bold text-slate-500" }, "퇴사일자 (비워두면 재직)"),
                                e('input', { type: "date", value: formData.resign_date, onChange: (ev) => setFormData({ ...formData, resign_date: ev.target.value }), className: "w-full p-4 border rounded-xl outline-none focus:border-blue-500 bg-slate-50 focus:bg-white transition-colors font-bold" })
                            ),
                            e('div', { className: "pt-8 flex gap-4" },
                                e('button', { type: "button", onClick: closeModal, className: "flex-1 py-4 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 transition-colors" }, "취소"),
                                isEdit && !formData.resign_date && e('button', { type: "button", onClick: handleDelete, className: "flex-1 py-4 bg-red-100 text-red-600 font-bold rounded-xl hover:bg-red-200 transition-colors" }, "퇴사처리"),
                                e('button', { type: "submit", className: "flex-[2] py-4 bg-blue-600 text-white font-bold rounded-xl shadow-lg hover:bg-blue-700 transition-colors" }, "저장하기")
                            )
                        )
                    )
                )
            );
        }

        // ==== TAB 2: 보유 장비 현황 ====
        function EquipmentTab() {
            const [equipments, setEquipments] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({ id: '', eq_name: '', equipment_type: '고유량', limit_count: 0, serial_no: '' });
            const [isEdit, setIsEdit] = useState(false);

            useEffect(() => { fetchEquipments(); }, []);

            useEffect(() => {
                const handleEsc = (e) => {
                    if (e.key === 'Escape') setIsModalOpen(false);
                };
                window.addEventListener('keydown', handleEsc);
                return () => window.removeEventListener('keydown', handleEsc);
            }, []);

            const fetchEquipments = async () => {
                const { data } = await supabase.from('kiwe_equipments').select('*').order('equipment_type').order('eq_name');
                setEquipments(data || []);
            };

            const openNew = () => {
                setFormData({ eq_name: '', equipment_type: '고유량', limit_count: 0, serial_no: '' });
                setIsEdit(false);
                setIsModalOpen(true);
            };

            const openEdit = (eq) => {
                setFormData({
                    id: eq.id,
                    eq_name: eq.eq_name || '',
                    eq_name: eq.eq_name || '',
                    equipment_type: eq.equipment_type || '고유량',
                    limit_count: eq.limit_count || 0,
                    serial_no: eq.serial_no || ''
                });
                setIsEdit(true);
                setIsModalOpen(true);
            };

            const closeModal = () => setIsModalOpen(false);

            const handleSave = async (e) => {
                e.preventDefault();
                const payload = {
                    eq_name: formData.eq_name,
                    equipment_type: formData.equipment_type,
                    limit_count: Number(formData.limit_count),
                    serial_no: formData.serial_no
                };
                if (isEdit) await supabase.from('kiwe_equipments').update(payload).eq('id', formData.id);
                else await supabase.from('kiwe_equipments').insert([payload]);
                closeModal(); fetchEquipments();
            };

            const handleDelete = async () => {
                if (confirm('삭제하시겠습니까?')) {
                    await supabase.from('kiwe_equipments').delete().eq('id', formData.id);
                    closeModal(); fetchEquipments();
                }
            };

            return e('div', { className: "max-w-7xl mx-auto space-y-6" },
                e('div', { className: "flex justify-between items-center px-2" },
                    e('div', { className: "space-y-1" },
                        e('h2', { className: "text-2xl font-black text-slate-800" }, "보유 장비 현황"),
                        e('p', { className: "text-slate-500 font-medium" }, "실시간 보유 중인 장비 수량을 관리합니다.")
                    ),
                    e('button', { onClick: openNew, className: "bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-indigo-700 shadow-lg transition-all transform hover:-translate-y-1" }, "장비 추가")
                ),
                e('div', { className: "bg-white rounded-2xl shadow-lg border border-slate-100 overflow-hidden" },
                    e('table', { className: "w-full text-left" },
                        e('thead', { className: "bg-slate-50 border-b border-slate-200 text-slate-500 font-bold uppercase tracking-wider text-sm" },
                            e('tr', null,
                                e('th', { className: "px-8 py-4" }, "구분"),
                                e('th', { className: "px-8 py-4" }, "장비명"),
                                e('th', { className: "px-8 py-4" }, "보유장비수"),
                                e('th', { className: "px-8 py-4 text-right" }, "관리")
                            )
                        ),
                        e('tbody', { className: "divide-y divide-slate-100 text-base" },
                            equipments.map((eq) => e('tr', { key: eq.id, className: "hover:bg-indigo-50/50 transition-colors" },
                                e('td', { className: "px-8 py-4 font-bold text-indigo-600" }, eq.equipment_type || '-'),
                                e('td', { className: "px-8 py-4 font-bold text-slate-800" }, eq.eq_name),
                                e('td', { className: "px-8 py-4 font-mono text-indigo-600 font-bold" }, `${eq.limit_count} 개`),
                                e('td', { className: "px-8 py-4 text-right" },
                                    e('button', { onClick: () => openEdit(eq), className: "bg-slate-100 text-slate-700 font-bold px-6 py-2 rounded-lg hover:bg-slate-200 transition-colors text-sm" }, "수정/관리")
                                )
                            )),
                            equipments.length === 0 && e('tr', null, e('td', { colSpan: "4", className: "px-8 py-10 text-center text-slate-400 font-medium" }, "등록된 장비 정보가 없습니다."))
                        )
                    )
                ),
                isModalOpen && e('div', { className: "fixed inset-0 bg-slate-900/70 backdrop-blur-sm flex items-center justify-center z-50 p-6" },
                    e('div', { className: "bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden animate-slideUp" },
                        e('div', { className: "p-6 border-b bg-slate-50" },
                            e('h3', { className: "text-xl font-black text-slate-800" }, isEdit ? '장비 정보 수정' : '신규 장비 등록')
                        ),
                        e('form', { onSubmit: handleSave, className: "p-8 space-y-6" },
                            e('div', { className: "grid grid-cols-1 gap-4" },
                                e('div', { className: "space-y-1" },
                                    e('label', { className: "text-xs font-bold text-slate-400" }, "구분 *"),
                                    e('select', { required: true, value: formData.equipment_type, onChange: (ev) => setFormData({ ...formData, equipment_type: ev.target.value }), className: "w-full p-4 border rounded-xl outline-none focus:border-indigo-500 bg-slate-50 focus:bg-white transition-colors font-bold" },
                                        e('option', { value: "고유량" }, "고유량"),
                                        e('option', { value: "소음기" }, "소음기"),
                                        e('option', { value: "길에어" }, "길에어"),
                                        e('option', { value: "7L" }, "7L"),
                                        e('option', { value: "저유량" }, "저유량"),
                                        e('option', { value: "유량보정기" }, "유량보정기"),
                                        e('option', { value: "소음보정기" }, "소음보정기"),
                                        e('option', { value: "기타" }, "기타")
                                    )
                                ),
                                e('div', { className: "space-y-1" },
                                    e('label', { className: "text-xs font-bold text-slate-400" }, "장비명"),
                                    e('input', { required: true, value: formData.eq_name, onChange: (ev) => setFormData({ ...formData, eq_name: ev.target.value }), className: "w-full p-4 border rounded-xl outline-none focus:border-indigo-500 bg-slate-50 focus:bg-white transition-colors font-bold", placeholder: "장비명 입력" })
                                ),
                                e('div', { className: "space-y-1" },
                                    e('label', { className: "text-xs font-bold text-slate-400" }, "제조번호 (Serial No.)"),
                                    e('input', { value: formData.serial_no, onChange: (ev) => setFormData({ ...formData, serial_no: ev.target.value }), className: "w-full p-4 border rounded-xl outline-none focus:border-indigo-500 bg-slate-50 focus:bg-white transition-colors font-bold", placeholder: "S/N 입력" })
                                ),
                                e('div', { className: "space-y-1" },
                                    e('label', { className: "text-xs font-bold text-slate-400" }, "보유장비수"),
                                    e('input', { type: "number", required: true, value: formData.limit_count, onChange: (ev) => setFormData({ ...formData, limit_count: ev.target.value }), className: "w-full p-4 border rounded-xl outline-none focus:border-indigo-500 bg-slate-50 focus:bg-white transition-colors font-bold", placeholder: "수량 입력" })
                                )
                            ),
                            e('div', { className: "flex gap-3 pt-4" },

        // ===================== 단가설정 (5-Tab 구조) =====================
        function PriceTab() {
            // Sub-tab IDs
            const SUB_TABS = [
                { id: 'mgmt', label: '기본관리비', color: 'emerald' },
                { id: 'ana_gen', label: '분석수수료 (일반)', color: 'blue' },
                { id: 'ana_sup', label: '분석수수료 (비용지원)', color: 'violet' },
                { id: 'eng', label: '엔지니어링 노임', color: 'amber' },
                { id: 'contract', label: '계약단가 (사업장별)', color: 'rose' },
                { id: 'discount', label: '할인단가 (정액)', color: 'teal' },
            ];
            const [subTab, setSubTab] = useState('mgmt');
            const [years, setYears] = useState([]);
            const [data, setData] = useState({});       // { year: { category: [items] } }
            const [policies, setPolicies] = useState({});
            const [loading, setLoading] = useState(false);
            const [saving, setSaving] = useState(false);
            const [dirty, setDirty] = useState(false);

            // Modals
            const [addItemModal, setAddItemModal] = useState(false);
            const [newItem, setNewItem] = useState({ sub_category: '', method_name: '', item_name: '', target_category: null });
            const [addYearModal, setAddYearModal] = useState(false);
            const [newYear, setNewYear] = useState('');

            const tabConfig = {
                mgmt: { price_type: '일반', category: '기본관리비' },
                ana_gen: { price_type: '일반', category: '분석수수료' },
                ana_sup: { price_type: '비용지원', category: null }, // Load both 분석수수료 and 기본관리비
                eng: { price_type: '엔지니어링', category: null }, // all categories
                contract: { price_type: null, category: null }, // handled by ContractPriceTab
                discount: { price_type: null, category: null }, // handled by DiscountPriceTab
            };

            useEffect(() => { loadData(); }, [subTab]);

            const loadData = async () => {
                setLoading(true); setDirty(false);
                try {
                    const cfg = tabConfig[subTab];
                    let q = supabase.from('kiwe_price_settings').select('*')
                        .eq('price_type', cfg.price_type)
                        .order('year', { ascending: true })
                        .order('sort_order');
                    if (cfg.category) q = q.eq('category', cfg.category);

                    const { data: rows } = await q;
                    const foundYears = [...new Set((rows || []).map(r => r.year))].sort();
                    const ys = foundYears.length > 0 ? foundYears : [new Date().getFullYear()];
                    setYears(ys);

                    // Organize by year → category → items[]
                    const org = {};
                    ys.forEach(y => org[y] = {});
                    (rows || []).forEach(row => {
                        if (!org[row.year]) org[row.year] = {};
                        const cat = row.category;
                        if (!org[row.year][cat]) org[row.year][cat] = [];
                        org[row.year][cat].push(row);
                    });
                    setData(org);

                    // 비용지원 정책 별도 로드
                    if (subTab === 'ana_sup') {
                        const { data: pRows } = await supabase.from('kiwe_price_settings')
                            .select('*').eq('price_type', '비용지원').eq('category', '지원정책');
                        const polMap = {};
                        ys.forEach(y => polMap[y] = {});
                        (pRows || []).forEach(p => { if (polMap[p.year]) polMap[p.year][p.item_name] = p.unit_price; });
                        setPolicies(polMap);
                    }
                } catch (err) { console.error(err); }
                setLoading(false);
            };

            const fmt = n => Number(n || 0).toLocaleString('ko-KR');

            const updateItem = (year, cat, idx, field, val) => {
                setData(prev => {
                    const copy = JSON.parse(JSON.stringify(prev));
                    if (copy[year]?.[cat]?.[idx] !== undefined) {
                        const newVal = (field === 'unit_price') ? (Number(String(val).replace(/,/g, '')) || 0) : val;

                        // Metadata fields (sub_category, method_name, item_name) should stay sync across years for same item index
                        if (['sub_category', 'method_name', 'item_name'].includes(field)) {
                            years.forEach(y => {
                                if (copy[y]?.[cat]?.[idx]) copy[y][cat][idx][field] = newVal;
                            });
                        } else {
                            copy[year][cat][idx][field] = newVal;
                        }
                    }
                    return copy;
                });
                setDirty(true);
            };

            const updatePolicy = (year, key, val) => {
                setPolicies(prev => ({ ...prev, [year]: { ...prev[year], [key]: Number(String(val).replace(/,/g, '')) || 0 } }));
                setDirty(true);
            };

            const deleteItem = async (item) => {
                if (!confirm(`'${item.item_name}' 항목을 삭제하시겠습니까?`)) return;
                if (item.id) {
                    const { error } = await supabase.from('kiwe_price_settings').delete().eq('id', item.id);
                    if (error) { alert('삭제 오류: ' + error.message); return; }
                }
                loadData();
            };

            const openAddYear = () => {
                const last = years.length > 0 ? Math.max(...years) : new Date().getFullYear();
                setNewYear(String(last + 1));
                setAddYearModal(true);
            };

            const doAddYear = () => {
                const y = parseInt(newYear);
                if (!y || y < 2020 || y > 2040) { alert('올바른 연도를 입력하세요.'); return; }
                if (years.includes(y)) { alert(`${y}년은 이미 존재합니다.`); return; }
                const last = years.length > 0 ? Math.max(...years) : y - 1;
                setYears(prev => [...prev, y].sort());
                setData(prev => {
                    const copy = JSON.parse(JSON.stringify(prev));
                    copy[y] = {};
                    const lastData = copy[last] || {};
                    Object.entries(lastData).forEach(([cat, list]) => {
                        copy[y][cat] = list.map(it => ({ ...it, id: undefined, year: y, unit_price: it.unit_price || 0 }));
                    });
                    return copy;
                });
                if (subTab === 'ana_sup') {
                    setPolicies(prev => ({ ...prev, [y]: { ...(prev[last] || {}) } }));
                }
                setDirty(true);
                setAddYearModal(false);
            };

            const removeYear = (y) => {
                if (!confirm(`${y}년 단가 설정을 제거하시겠습니까? (화면에서만 제거, DB 데이터는 유지됩니다)`)) return;
                setYears(prev => prev.filter(yr => yr !== y));
                setData(prev => { const c = JSON.parse(JSON.stringify(prev)); delete c[y]; return c; });
            };

            const openAddItem = (cat = null, defaults = {}) => {
                setNewItem({
                    sub_category: defaults.sub_category || '',
                    method_name: defaults.method_name || '',
                    item_name: defaults.item_name || '',
                    target_category: cat
                });
                setAddItemModal(true);
            };

            const doAddItem = () => {
                const name = newItem.item_name.trim();
                if (!name) { alert(subTab === 'eng' ? '소분류(품명)를 입력하세요.' : '분석법(구분)을 입력하세요.'); return; }
                const cat = newItem.target_category || (subTab === 'eng' ? '엔지니어링노임' : '분석수수료');
                const pt = tabConfig[subTab].price_type;
                setData(prev => {
                    const copy = JSON.parse(JSON.stringify(prev));
                    years.forEach(y => {
                        if (!copy[y]) copy[y] = {};
                        if (!copy[y][cat]) copy[y][cat] = [];
                        const exists = copy[y][cat].some(it => it.item_name === name);
                        if (!exists) {
                            copy[y][cat].push({
                                year: y, price_type: pt, category: cat,
                                sub_category: newItem.sub_category.trim() || null,
                                method_name: newItem.method_name.trim() || null,
                                item_name: name, unit_price: 0, is_fixed: false
                            });
                        }
                    });
                    return copy;
                });
                setDirty(true);

                        subTab === 'mgmt' && renderMgmt(),
                        (subTab === 'ana_gen') && renderAnalysis('일반', 'blue'),
                        (subTab === 'ana_sup') && renderAnalysis('비용지원', 'violet'),
                        subTab === 'eng' && renderEngineering(),
                        subTab === 'contract' && e(ContractPriceTab, null),
                        subTab === 'discount' && e(DiscountPriceTab, null)
                    ),

                // ── 연도 추가 모달 ──
                addYearModal && e('div', { className: 'fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-6' },
                    e('div', { className: 'bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden' },
                        e('div', { className: 'px-8 py-6 border-b bg-slate-50' },
                            e('h3', { className: 'text-xl font-black text-slate-800' }, '연도 추가'),
                            e('p', { className: 'text-slate-500 text-sm mt-1' }, '최근 연도 데이터를 복사하여 새 연도를 생성합니다.')
                        ),
                        e('div', { className: 'p-8 space-y-5' },
                            e('div', { className: 'space-y-2' },
                                e('label', { className: 'text-sm font-bold text-slate-500' }, '추가할 연도'),
                                e('input', {
                                    type: 'number', value: newYear, min: 2020, max: 2040,
                                    onChange: ev => setNewYear(ev.target.value),
                                    className: 'w-full p-4 border-2 border-slate-200 rounded-xl text-xl font-black text-center outline-none focus:border-slate-500'
                                })
                            ),
                            e('div', { className: 'flex gap-3' },
                                e('button', { onClick: () => setAddYearModal(false), className: 'flex-1 py-3.5 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200' }, '취소'),
                                e('button', { onClick: doAddYear, className: 'flex-[2] py-3.5 bg-slate-700 text-white font-bold rounded-xl shadow-lg hover:bg-slate-800' }, `${newYear}년 추가`)
                            )
                        )
                    )
                ),

                // ── 항목 추가 모달 (분석수수료/엔지니어링 전용) ──
                addItemModal && (subTab === 'ana_gen' || subTab === 'ana_sup' || subTab === 'eng') &&
                e('div', { className: 'fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-6' },
                    e('div', { className: 'bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden' },
                        e('div', { className: 'px-8 py-6 border-b bg-slate-50 flex justify-between items-center' },
                            e('div', null,
                                e('h3', { className: 'text-xl font-black text-slate-800' }, '항목 추가'),
                                e('p', { className: 'text-slate-500 text-sm mt-0.5' }, '모든 연도에 동일하게 추가됩니다. 단가는 이후 수정하세요.')
                            ),
                            e('button', { onClick: () => setAddItemModal(false), className: 'text-slate-400 hover:text-slate-600 text-xl font-bold' }, '✕')
                        ),
                        e('div', { className: 'p-8 space-y-5' },
                            e('div', { className: 'space-y-2' },
                                e('label', { className: 'text-sm font-bold text-slate-500' }, subTab === 'eng' ? '대분류 (sub_category)' : '항목 (유해인자 대분류)'),
                                e('input', {
                                    type: 'text', value: newItem.sub_category,
                                    onChange: ev => setNewItem(p => ({ ...p, sub_category: ev.target.value })),
                                    placeholder: subTab === 'eng' ? '예: 엔지니어링 기타부문 노임단가' : '예: 유기화합물, 금속류, 분진 등',
                                    className: 'w-full p-4 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-300 font-bold'
                                })
                            ),
                            e('div', { className: 'space-y-2' },
                                e('label', { className: 'text-sm font-bold text-slate-500' }, subTab === 'eng' ? '중분류 (method_name)' : '측정방법명'),
                                e('input', {
                                    type: 'text', value: newItem.method_name,
                                    onChange: ev => setNewItem(p => ({ ...p, method_name: ev.target.value })),
                                    placeholder: subTab === 'eng' ? '예: 고유량펌프, 소음노출량계' : '예: 여과채취법, 직독식 등',
                                    className: 'w-full p-4 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-300 font-bold'
                                })
                            ),
                            e('div', { className: 'space-y-2' },
                                e('label', { className: 'text-sm font-bold text-slate-600' }, subTab === 'eng' ? '소분류/장비명 (item_name) *' : '분석법(구분) *'),
                                e('input', {
                                    type: 'text', value: newItem.item_name,
                                    onChange: ev => setNewItem(p => ({ ...p, item_name: ev.target.value })),
                                    placeholder: subTab === 'eng' ? '예: 특급기술자, ME20 등' : '예: ICP법, GC법(다성분) 등',
                                    className: 'w-full p-4 border-2 border-blue-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-400 font-bold text-slate-800'
                                })
                            ),
                            e('div', { className: 'flex gap-3 pt-2' },
                                e('button', { onClick: () => setAddItemModal(false), className: 'flex-1 py-3.5 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200' }, '취소'),
                                e('button', { onClick: doAddItem, className: 'flex-[2] py-3.5 bg-blue-600 text-white font-bold rounded-xl shadow-lg hover:bg-blue-700' }, '항목 추가')
                            )
                        )
                    )
                )
            );
        }

        // ==== 계약단가 (사업장별) 탭 ====
        function ContractPriceTab() {
            const [clients, setClients] = useState([]);
            const [selectedClient, setSelectedClient] = useState(null);
            const [searchText, setSearchText] = useState('');
            const [showDrop, setShowDrop] = useState(false);
            const [contractData, setContractData] = useState(null);
            // contractData = { mgmt: [{item_name, unit_price, id}], prelim: [{item_name, unit_price, id}], ana: [{item_name, unit_price, id, sub_category, method_name}] }
            const [saving, setSaving] = useState(false);
            const [dirty, setDirty] = useState(false);
            const [newAnaItem, setNewAnaItem] = useState({ sub_category: '', method_name: '', item_name: '' });
            const [showAddAna, setShowAddAna] = useState(false);

            // 기본관리비 표준 규격 목록 (일반 단가에서 가져옴)
            const [stdMgmtItems, setStdMgmtItems] = useState([]);

            useEffect(() => {
                loadClients();
                loadStdMgmt();
            }, []);

            const loadClients = async () => {
                const [{ data: qClients }, { data: companies }] = await Promise.all([
                    supabase.from('kiwe_quotation_clients').select('id, client_name, com_id').order('client_name'),
                    supabase.from('kiwe_companies').select('com_id, com_name, com_reg_no, address, ceo_name, tel, fax, biz_type, main_product').order('com_name')
                ]);

                const registeredMap = (qClients || []).reduce((acc, c) => {
                    if (c.com_id) acc[c.com_id] = c.id;
                    return acc;
                }, {});

                const unified = (companies || []).map(co => ({
                    id: registeredMap[co.com_id] || null, // 이미 등록되어 있으면 그 ID 사용
                    client_name: co.com_name,
                    com_id: co.com_id,
                    isRegistered: !!registeredMap[co.com_id],
                    comData: co
                }));

                // kiwe_quotation_clients에는 있지만 kiwe_companies에는 매핑되지 않은 데이터도 추가
                const linkedComIds = new Set((companies || []).map(co => co.com_id));
                const extras = (qClients || []).filter(qc => !qc.com_id || !linkedComIds.has(qc.com_id)).map(qc => ({
                    id: qc.id,
                    client_name: qc.client_name,
                    com_id: qc.com_id,
                    isRegistered: true,
                    comData: null
                }));

                setClients([...unified, ...extras].sort((a,b) => a.client_name.localeCompare(b.client_name)));
            };

            const loadStdMgmt = async () => {
                const yr = new Date().getFullYear();
                const { data } = await supabase.from('kiwe_price_settings')
                    .select('item_name').eq('price_type', '일반').eq('category', '기본관리비').eq('year', yr).order('sort_order');
                if (data && data.length > 0) {
                    setStdMgmtItems(data.map(d => d.item_name));
                } else {
                    setStdMgmtItems(['1~49인','50~99인','100~299인','300~499인','500~999인','1000~1999인','2000~2999인','3000인 이상']);
                }
            };

            const selectClient = async (c) => {
                let finalId = c.id;
                
                // 만약 사업장에는 있지만 거래처(kiwe_quotation_clients)에는 없다면 자동 등록
                if (!finalId && c.comData) {
                    if (!confirm(`'${c.client_name}'은(는) 아직 견적 거래처로 등록되지 않았습니다.\n거래처로 등록하고 계약단가 설정을 진행하시겠습니까?`)) return;
                    
                    const payload = {
                        client_name: c.comData.com_name,
                        com_id: c.comData.com_id,
                        biz_reg_no: c.comData.com_reg_no,
                        address: c.comData.address,
                        ceo_name: c.comData.ceo_name,
                        manager_name: c.comData.ceo_name,
                        tel: c.comData.tel,
                        fax: c.comData.fax,
                        biz_type: c.comData.biz_type,
                        biz_item: c.comData.main_product,
                        updated_at: new Date().toISOString()
                    };
                    
                    const { data: ins, error } = await supabase.from('kiwe_quotation_clients').insert(payload).select().single();
                    if (error) { alert('거래처 등록 실패: ' + error.message); return; }
                    finalId = ins.id;
                    // 등록 후 목록 갱신 및 선택 처리
                    await loadClients();
                }

                if (!finalId) return;

                setSelectedClient({ ...c, id: finalId });
                setSearchText(c.client_name);
                setShowDrop(false);
                await loadContractData(finalId);
            };

            const loadContractData = async (clientId) => {
                const pt = `계약_${clientId}`;
                const { data } = await supabase.from('kiwe_price_settings')
                    .select('*').eq('price_type', pt).order('sort_order');

                const rows = data || [];
                const mgmtRows = rows.filter(r => r.category === '기본관리비');
                const prelimRows = rows.filter(r => r.category === '예비조사');
                const anaRows = rows.filter(r => r.category === '분석수수료');

                // 기본관리비: 표준 규격 기준, DB에 없는 항목은 단가 0으로 채움
                const mgmt = stdMgmtItems.length > 0
                    ? stdMgmtItems.map(name => {
                        const found = mgmtRows.find(r => r.item_name === name);
                        return { item_name: name, unit_price: found ? found.unit_price : 0, id: found ? found.id : null };
                    })
                    : mgmtRows.map(r => ({ item_name: r.item_name, unit_price: r.unit_price, id: r.id }));

                // 예비조사: DB에 없으면 기본 1행 생성
                const prelim = prelimRows.length > 0
                    ? [{ item_name: '예비조사', unit_price: prelimRows[0].unit_price, id: prelimRows[0].id }]
                    : [{ item_name: '예비조사', unit_price: 0, id: null }];

                const ana = anaRows.map(r => ({ item_name: r.item_name, unit_price: r.unit_price, id: r.id, sub_category: r.sub_category || '', method_name: r.method_name || '' }));

                setContractData({ mgmt, prelim, ana });
                setDirty(false);
            };

            const updateMgmt = (idx, val) => {
                setContractData(p => {
                    const next = { ...p, mgmt: [...p.mgmt] };
                    next.mgmt[idx] = { ...next.mgmt[idx], unit_price: Number(String(val).replace(/,/g,'')) || 0 };
                    return next;
                });
                setDirty(true);
            };

            const updatePrelim = (val) => {
                setContractData(p => ({ ...p, prelim: [{ ...p.prelim[0], unit_price: Number(String(val).replace(/,/g,'')) || 0 }] }));
                setDirty(true);
            };

            const updateAna = (idx, field, val) => {
                setContractData(p => {
                    const next = { ...p, ana: [...p.ana] };
                    next.ana[idx] = { ...next.ana[idx], [field]: field === 'unit_price' ? (Number(String(val).replace(/,/g,'')) || 0) : val };
                    return next;
                });
                setDirty(true);
            };

            const addAnaItem = () => {
                if (!newAnaItem.item_name.trim()) { alert('분석법(구분)을 입력하세요.'); return; }
                setContractData(p => ({
                    ...p,
                    ana: [...p.ana, { item_name: newAnaItem.item_name.trim(), unit_price: 0, id: null, sub_category: newAnaItem.sub_category.trim(), method_name: newAnaItem.method_name.trim() }]
                }));
                setNewAnaItem({ sub_category: '', method_name: '', item_name: '' });
                setShowAddAna(false);
                setDirty(true);
            };

            const deleteAnaItem = async (idx) => {
                const it = contractData.ana[idx];
                if (!confirm(`'${it.item_name}' 항목을 삭제하시겠습니까?`)) return;
                if (it.id) {
                    const { error } = await supabase.from('kiwe_price_settings').delete().eq('id', it.id);
                    if (error) { alert('삭제 오류: ' + error.message); return; }
                }
                setContractData(p => ({ ...p, ana: p.ana.filter((_, i) => i !== idx) }));
                setDirty(true);
            };

            const saveContract = async () => {
                if (!selectedClient) return;
                setSaving(true);
                try {
                    const pt = `계약_${selectedClient.id}`;
                    const rows = [];
                    contractData.mgmt.forEach((it, i) => rows.push({ price_type: pt, category: '기본관리비', item_name: it.item_name, unit_price: it.unit_price, sort_order: i+1, is_fixed: true, year: 0, sub_category: null, method_name: null }));
                    contractData.prelim.forEach((it, i) => rows.push({ price_type: pt, category: '예비조사', item_name: it.item_name, unit_price: it.unit_price, sort_order: i+1, is_fixed: true, year: 0, sub_category: null, method_name: null }));
                    contractData.ana.forEach((it, i) => rows.push({ price_type: pt, category: '분석수수료', item_name: it.item_name, unit_price: it.unit_price, sort_order: i+1, is_fixed: false, year: 0, sub_category: it.sub_category || null, method_name: it.method_name || null }));

                    const { error } = await supabase.from('kiwe_price_settings')
                        .upsert(rows, { onConflict: 'year,price_type,category,item_name' });
                    if (error) throw error;
                    alert(`[${selectedClient.client_name}] 계약단가가 저장되었습니다.`);
                    setDirty(false);
                    await loadContractData(selectedClient.id);
                } catch(err) { alert('저장 실패: ' + err.message); }
                setSaving(false);
            };

            const fClients = clients.filter(c => c.client_name.includes(searchText));
            const fmt = n => Number(n || 0).toLocaleString('ko-KR');

            return e('div', { className: 'max-w-5xl mx-auto space-y-6' },
                // ── 헤더 ──
                e('div', { className: 'bg-rose-50 border border-rose-200 rounded-2xl p-5' },
                    e('h3', { className: 'text-lg font-black text-rose-800 mb-1' }, '계약단가 (사업장별)'),
                    e('p', { className: 'text-sm text-rose-600 font-medium' }, '특정 사업장과 별도 계약한 단가를 등록합니다. 예비조사 → 기본관리비 → 분석수수료 순으로 견적서에 적용됩니다.')
                ),

                // ── 거래처 선택 ──
                e('div', { className: 'bg-white rounded-2xl border border-slate-200 shadow-sm p-6' },
                    e('label', { className: 'block text-sm font-black text-slate-600 mb-2' }, '사업장(거래처) 선택'),
                    e('div', { className: 'relative max-w-md' },
                        e('input', {
                            type: 'text', value: searchText,
                            onChange: ev => { setSearchText(ev.target.value); setShowDrop(true); },
                            onFocus: () => setShowDrop(true),
                            onBlur: () => setTimeout(() => setShowDrop(false), 200),
                            placeholder: '거래처명 검색...',
                            className: 'w-full px-4 py-3 border-2 border-rose-200 rounded-xl outline-none focus:border-rose-500 font-bold text-slate-800'
                        }),
                        showDrop && fClients.length > 0 && e('div', { className: 'absolute z-20 w-full bg-white border border-slate-200 rounded-xl shadow-xl max-h-64 overflow-y-auto mt-1' },
                            fClients.map(c => e('div', {
                                key: c.com_id || c.id, onClick: () => selectClient(c),
                                className: 'px-4 py-2.5 hover:bg-rose-50 cursor-pointer text-sm font-bold border-b border-slate-50 flex items-center justify-between'
                            }, 
                                e('span', null, c.client_name),
                                c.isRegistered 
                                    ? e('span', { className: 'text-[9px] px-1.5 py-0.5 bg-emerald-100 text-emerald-600 rounded uppercase font-black' }, 'Registered')
                                    : e('span', { className: 'text-[9px] px-1.5 py-0.5 bg-rose-100 text-rose-600 rounded uppercase font-black' }, 'New')
                            ))
                        )
                    ),
                    selectedClient && e('div', { className: 'mt-3 flex items-center gap-2' },
                        e('span', { className: 'px-3 py-1 bg-rose-100 text-rose-700 rounded-lg text-sm font-black' }, `✅ ${selectedClient.client_name}`),
                        e('span', { className: 'text-xs text-slate-400 font-bold' }, `price_type: 계약_${selectedClient.id}`)
                    )
                ),

                // ── 단가 입력 (거래처 선택 후) ──
                selectedClient && contractData && e('div', { className: 'space-y-5' },

                    // ① 예비조사
                    e('div', { className: 'bg-white rounded-2xl border border-rose-200 shadow-sm overflow-hidden' },
                        e('div', { className: 'bg-rose-50 px-6 py-4 border-b border-rose-200' },
                            e('h3', { className: 'font-black text-rose-800 text-base' }, '① 예비조사 단가'),
                            e('p', { className: 'text-xs text-rose-600 font-bold mt-0.5' }, '예비조사 방문당(1회) 단가를 입력합니다.')
                        ),
                        e('div', { className: 'p-5' },
                            e('div', { className: 'flex items-center gap-4 max-w-xs' },
                                e('label', { className: 'text-sm font-bold text-slate-600 w-24 shrink-0' }, '예비조사 단가'),
                                e('input', {
                                    type: 'text', value: fmt(contractData.prelim[0]?.unit_price),
                                    onChange: ev => updatePrelim(ev.target.value),
                                    className: 'flex-1 px-3 py-2 border-2 border-rose-200 rounded-lg text-right font-black text-sm outline-none focus:border-rose-500'
                                }),
                                e('span', { className: 'text-sm text-slate-400 font-bold' }, '원 / 회')
                            )
                        )
                    ),

                    // ② 기본관리비
                    e('div', { className: 'bg-white rounded-2xl border border-emerald-200 shadow-sm overflow-hidden' },
                        e('div', { className: 'bg-emerald-50 px-6 py-4 border-b border-emerald-200' },
                            e('h3', { className: 'font-black text-emerald-800 text-base' }, '② 기본관리비 단가 (사업장 규모별)'),
                            e('p', { className: 'text-xs text-emerald-600 font-bold mt-0.5' }, '규격별 계약 단가를 입력합니다. (0 = 미사용)')
                        ),
                        e('div', { className: 'overflow-x-auto' },
                            e('table', { className: 'w-full text-sm' },
                                e('thead', null, e('tr', { className: 'bg-slate-50 text-xs text-slate-500 font-bold border-b' },
                                    e('th', { className: 'px-5 py-3 text-left w-8' }, 'No'),
                                    e('th', { className: 'px-5 py-3 text-left' }, '규격 (사업장 인원수)'),
                                    e('th', { className: 'px-5 py-3 text-right min-w-[160px]' }, '계약 단가 (원)')
                                )),
                                e('tbody', { className: 'divide-y divide-slate-100' },
                                    contractData.mgmt.map((it, idx) => e('tr', { key: idx, className: 'hover:bg-emerald-50/30 transition-colors' },
                                        e('td', { className: 'px-5 py-2.5 text-slate-400 font-bold text-xs' }, idx + 1),
                                        e('td', { className: 'px-5 py-2.5 font-bold text-slate-700' }, it.item_name),
                                        e('td', { className: 'px-4 py-2 text-right' },
                                            e('input', {
                                                type: 'text', value: fmt(it.unit_price),
                                                onChange: ev => updateMgmt(idx, ev.target.value),
                                                className: 'w-36 px-3 py-1.5 border border-slate-200 rounded-lg text-right text-sm font-black outline-none focus:ring-2 focus:ring-emerald-300 bg-white'
                                            })
                                        )
                                    ))
                                )
                            )
                        )
                    ),

                    // ③ 분석수수료
                    e('div', { className: 'bg-white rounded-2xl border border-blue-200 shadow-sm overflow-hidden' },
                        e('div', { className: 'bg-blue-50 px-6 py-4 border-b border-blue-200 flex justify-between items-center' },

        // ==== 할인단가 (정액할인) 탭 ====
        function DiscountPriceTab() {
            const [discountData, setDiscountData] = useState(null);
            const [saving, setSaving] = useState(false);
            const [dirty, setDirty] = useState(false);
            const [newAnaItem, setNewAnaItem] = useState({ sub_category: '', method_name: '', item_name: '' });
            const [showAddAna, setShowAddAna] = useState(false);

            useEffect(() => { loadData(); }, []);

            const loadData = async () => {
                // 1. 표준 기본관리비 규격
                const yr = new Date().getFullYear();
                const { data: stdData } = await supabase.from('kiwe_price_settings')
                    .select('item_name').eq('price_type', '일반').eq('category', '기본관리비').eq('year', yr).order('sort_order');
                let mgmtKeys = stdData && stdData.length > 0 ? stdData.map(d => d.item_name) : ['1~49인','50~99인','100~299인','300~499인','500~999인','1000~1999인','2000~2999인','3000인 이상'];

                // 2. 할인단가 가져오기
                const { data } = await supabase.from('kiwe_price_settings')
                    .select('*').eq('price_type', '할인단가').order('sort_order');
                const rows = data || [];
                const mgmtRows = rows.filter(r => r.category === '기본관리비');
                const anaRows = rows.filter(r => r.category === '분석수수료');

                const mgmt = mgmtKeys.map(name => {
                    const found = mgmtRows.find(r => r.item_name === name);
                    return { item_name: name, unit_price: found ? found.unit_price : 0, id: found ? found.id : null };
                });
                const ana = anaRows.map(r => ({ item_name: r.item_name, unit_price: r.unit_price, id: r.id, sub_category: r.sub_category || '', method_name: r.method_name || '' }));

                setDiscountData({ mgmt, ana });
                setDirty(false);
            };

            const updateMgmt = (idx, val) => {
                setDiscountData(p => {
                    const next = { ...p, mgmt: [...p.mgmt] };
                    next.mgmt[idx] = { ...next.mgmt[idx], unit_price: Number(String(val).replace(/,/g,'')) || 0 };
                    return next;
                });
                setDirty(true);
            };

            const updateAna = (idx, field, val) => {
                setDiscountData(p => {
                    const next = { ...p, ana: [...p.ana] };
                    next.ana[idx] = { ...next.ana[idx], [field]: field === 'unit_price' ? (Number(String(val).replace(/,/g,'')) || 0) : val };
                    return next;
                });
                setDirty(true);
            };

            const addAnaItem = () => {
                if (!newAnaItem.item_name.trim()) { alert('분석법(구분)을 입력하세요.'); return; }
                setDiscountData(p => ({
                    ...p,
                    ana: [...p.ana, { item_name: newAnaItem.item_name.trim(), unit_price: 0, id: null, sub_category: newAnaItem.sub_category.trim(), method_name: newAnaItem.method_name.trim() }]
                }));
                setNewAnaItem({ sub_category: '', method_name: '', item_name: '' });
                setShowAddAna(false);
                setDirty(true);
            };

            const deleteAnaItem = async (idx) => {
                const it = discountData.ana[idx];
                if (!confirm(`'${it.item_name}' 항목을 삭제하시겠습니까?`)) return;
                if (it.id) {
                    const { error } = await supabase.from('kiwe_price_settings').delete().eq('id', it.id);
                    if (error) { alert('삭제 오류: ' + error.message); return; }
                }
                setDiscountData(p => ({ ...p, ana: p.ana.filter((_, i) => i !== idx) }));
                setDirty(true);
            };

            const saveDiscount = async () => {
                setSaving(true);
                try {
                    const rows = [];
                    discountData.mgmt.forEach((it, i) => rows.push({ price_type: '할인단가', category: '기본관리비', item_name: it.item_name, unit_price: it.unit_price, sort_order: i+1, is_fixed: true, year: 0, sub_category: null, method_name: null }));
                    discountData.ana.forEach((it, i) => rows.push({ price_type: '할인단가', category: '분석수수료', item_name: it.item_name, unit_price: it.unit_price, sort_order: i+1, is_fixed: false, year: 0, sub_category: it.sub_category || null, method_name: it.method_name || null }));

                    const { error } = await supabase.from('kiwe_price_settings')
                        .upsert(rows, { onConflict: 'year,price_type,category,item_name' });
                    if (error) throw error;
                    alert(`할인단가(정액할인)가 저장되었습니다.`);
                    setDirty(false);
                    await loadData();
                } catch(err) { alert('저장 실패: ' + err.message); }
                setSaving(false);
            };

            const fmt = n => Number(n || 0).toLocaleString('ko-KR');

            return e('div', { className: 'max-w-5xl mx-auto space-y-6' },

                ),
                discountData && e('div', { className: 'space-y-5' },

                                )),

                                    discountData.mgmt.map((it, idx) => e('tr', { key: idx, className: 'hover:bg-teal-50/30 transition-colors' },
