<!DOCTYPE html>
<html lang="ko">

<head>
    <script src="js/error_translator.js"></script>
    <meta charset="UTF-8">
    <base href="./">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https: 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https://jztrnwchgxymknjvsbkl.supabase.co https://*.supabase.co wss://*.supabase.co https://unpkg.com https://*.lucide.dev https://cdn.jsdelivr.net https://cdnjs.cloudflare.com http://127.0.0.1:* http://localhost:*; img-src 'self' data: https:; font-src 'self' https: data:;">
    <title>측정기록 관리 - KiWE 측정 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        function showError(title, msg) {
            const root = document.getElementById('root');
            if (root) {
                root.innerHTML = `<div style="padding: 40px; text-align: center; font-family: sans-serif; background: #fff1f2; border: 2px solid #fda4af; margin: 20px; border-radius: 12px;">
                    <div style="color: #e11d48; font-size: 24px; font-weight: bold; margin-bottom: 10px;">${title}</div>
                    <div style="color: #4b5563; margin-top: 10px; font-family: monospace; white-space: pre-wrap; font-size: 14px;">${msg}</div>
                    <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 20px; background: #4f46e5; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">새로고침</button>
                    <div style="margin-top: 15px; font-size: 12px; color: #9ca3af;">파일 경로 및 서버 실행 여부를 확인해주세요.</div>
                </div>`;
            }
        }

        window.onerror = function (msg, url, line, col, error) {
            console.error("Global Error:", msg, url, line);
            showError("시스템 로드 오류", `Error: ${msg}\nUrl: ${url}\nLine: ${line}`);
            return false;
        };

        window.addEventListener('unhandledrejection', function (event) {
            console.error("Unhandled Rejection:", event.reason);
            showError("비동기 처리 오류", event.reason?.message || event.reason || "알 수 없는 오류");
        });

        // Catch module loading errors
        window.addEventListener('error', function (event) {
            if (event.target.tagName === 'SCRIPT' && event.target.type === 'module') {
                showError("모듈 로드 실패", `파일을 불러올 수 없습니다: ${event.target.src}\n\n로컬(file://) 환경에서는 보안상 모듈이 작동하지 않을 수 있습니다.\nLive Server 등을 사용하여 실행해주세요.`);
            }
        }, true);
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .th-cell {
            padding: 16px;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            font-size: 0.75rem;
            border-bottom: 1px solid #e2e8f0;
            background: #f8fafc;
        }

        .td-cell {
            padding: 16px;
            font-weight: 700;
            color: #1e293b;
            font-size: 0.875rem;
            border-bottom: 1px solid #f1f5f9;
        }

        .label-style {
            background: #f1f5f9;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 800;
            color: #64748b;
            margin-bottom: 4px;
            display: inline-block;
        }

        .input-center {
            text-align: center;
        }

        .multi-select-dropdown {
            max-height: 150px;
            overflow-y: auto;
            background: white;
            border: 1px solid #e2e8f0;
            position: absolute;
            width: 100%;
            top: 100%;
            z-index: 20;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            display: none;
        }

        .multi-select-dropdown.show {
            display: block;
        }
    </style>
    <script type="module">
        import { checkAuth } from './js/auth.js';
        checkAuth();
    </script>
</head>

<body class="bg-gray-50 text-slate-800 font-sans">
    <div id="print-area"></div>
    <div id="root">
        <div
            style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 15px; font-family: sans-serif;">
            <div
                style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%; animation: spin 1s linear infinite;">
            </div>
            <div style="font-weight: bold; color: #475569;">시스템 로딩 중...</div>
            <style>
                @keyframes spin {
                    0% {
                        transform: rotate(0deg);
                    }

                    100% {
                        transform: rotate(360deg);
                    }
                }
            </style>
        </div>
    </div>

    <script type="module" src="./js/records.js"></script>
</body>

</html>
