<!DOCTYPE html>
<html lang="ko">

<head>
    <script src="js/error_translator.js"></script>
    <meta charset="UTF-8">
    <base href="./">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https: 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://unpkg.com https://*.lucide.dev https://esm.sh http://127.0.0.1:* http://localhost:*; img-src 'self' data: https:; font-src 'self' https: data:;">
    <title>유해인자 검색 - KiWE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script>
        window.onerror = function (msg, url, line, col, error) {
            console.error("Global Error:", msg, url, line);
            const root = document.getElementById('root');
            if (root && (root.innerHTML.includes('로딩') || root.innerHTML === '')) {
                root.innerHTML = `<div style="padding: 40px; text-align: center; font-family: sans-serif;">
                    <div style="color: #e11d48; font-size: 24px; font-weight: bold; mb: 10px;">시스템 로드 오류</div>
                    <div style="color: #64748b; margin-top: 10px;">화면을 불러오는 중 문제가 발생했습니다.<br/>잠시 후 다시 시도해주세요.</div>
                    <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 20px; background: #4f46e5; color: white; border: none; border-radius: 8px; cursor: pointer;">새로고침</button>
                </div>`;
            }
            return false;
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
        }

        .input-standard {
            width: 100%;
            padding: 0.5rem 0.75rem;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            outline: none;
            transition: all 0.2s;
        }

        .input-standard:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
            background-color: white;
        }

        .scroll-custom::-webkit-scrollbar {
            width: 6px;
        }

        .scroll-custom::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        .scroll-custom::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
    <script type="module">
        import { checkAuth } from './js/auth.js';
        checkAuth();
    </script>
</head>

<body class="bg-white text-slate-900">
    <div id="root">
        <div
            style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 15px; font-family: sans-serif;">
            <div
                style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%; animation: spin 1s linear infinite;">
            </div>
            <div style="font-weight: bold; color: #475569;">시스템 로딩 중...</div>
            <style>
                @keyframes spin {
                    0% {
                        transform: rotate(0deg);
                    }

                    100% {
                        transform: rotate(360deg);
                    }
                }
            </style>
        </div>
    </div>

    <script type="module">
        import { Search, X, FlaskConical, Check, Plus, Send } from 'https://esm.sh/lucide-react@0.263.1';
        const { useState, useEffect, useMemo } = React;
        const e = React.createElement;

        // ==== Supabase Configuration ====
        const SUPABASE_URL = 'https://jztrnwchgxymknjvsbkl.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Z8oriOCik8fZlnAMgznUMg_IhmmFQ33';
        let supabase;
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch (err) {
            console.error("Supabase Init Error:", err);
        }

        function SearchApp() {
            const [hazards, setHazards] = useState([]);
            const [search, setSearch] = useState('');
            const [loading, setLoading] = useState(false);
            const [selectedHazards, setSelectedHazards] = useState([]);

            useEffect(() => {
                const fetchHazards = async () => {
                    setLoading(true);
                    try {
                        const { data, error } = await supabase
                            .from('kiwe_hazard')
                            .select('hazard_id, hazard_category, common_name, legal_name, cas_no, is_cmr_material, twa_ppm, twa_mg, stel_ppm, stel_mg, sampling_media, flow_rate, max_volume, min_volume, desorption_solvent, instrument_name, is_self, sampling, storage');
                        if (error) throw error;
                        setHazards(data || []);
                    } catch (err) {
                        console.error('Fetch error:', err);
                        alert('데이터를 가져오는데 실패했습니다.');
                    } finally {
                        setLoading(false);
                    }
                };
                fetchHazards();
            }, []);

            const filteredHazards = useMemo(() => {
                const term = search.toLowerCase();
                return hazards.filter(h =>
                    (h.common_name || '').toLowerCase().includes(term) ||
                    (h.cas_no || '').toLowerCase().includes(term) ||
                    (h.synonyms || '').toLowerCase().includes(term)
                );
            }, [hazards, search]);

            const toggleHazard = (hazard) => {
                const exists = selectedHazards.find(h => h.common_name === hazard.common_name);
                if (exists) {
                    setSelectedHazards(selectedHazards.filter(h => h.common_name !== hazard.common_name));
                } else {
                    setSelectedHazards([...selectedHazards, hazard]);
                }
            };

            const removeHazard = (common_name) => {
                setSelectedHazards(selectedHazards.filter(h => h.common_name !== common_name));
            };

            const handleConfirm = () => {
                if (selectedHazards.length === 0) {
                    alert('선택된 유해인자가 없습니다.');
                    return;
                }

                // Combine names and merge metadata from the first selected item
                const combinedName = selectedHazards.map(h => h.common_name).join(' / ');
                const base = selectedHazards[0];

                const result = {
                    common_name: combinedName,
                    hazard_category: base.hazard_category,
                    sampling: base.sampling,
                    instrument_name: base.instrument_name,
                    storage: base.storage,
                    sampling_media: base.sampling_media,
                    is_self: base.is_self,

                    // All other metadata
                    legal_name: base.legal_name,
                    synonyms: base.synonyms,
                    cas_no: base.cas_no,
                    is_cms: base.is_cms,
                    twa_ppm: base.twa_ppm,
                    twa_mg: base.twa_mg,
                    stel_ppm: base.stel_ppm,
                    stel_mg: base.stel_mg,
                    cat_no: base.cat_no,
                    flow_rate: base.flow_rate,
                    min_volume: base.min_volume,
                    max_volume: base.max_volume,

                    raw_data: selectedHazards
                };

                if (window.opener) {
                    window.opener.postMessage({ type: 'HAZARD_SELECT', data: result }, '*');
                    window.close();
                } else {
                    alert('부모 창을 찾을 수 없습니다.');
                }
            };

            return e('div', { className: "flex flex-col h-screen max-h-screen" },
                e('div', { className: "p-4 border-b flex items-center justify-between bg-slate-50 gap-4" },
                    e('div', { className: "flex items-center gap-2 text-indigo-700 min-w-max" },
                        e(FlaskConical, { size: 20 }),
                        e('h1', { className: "text-lg font-bold" }, "유해인자 다중 검색")
                    ),
                    e('div', { className: "flex items-center gap-2 flex-1 justify-end" },
                        e('button', { onClick: handleConfirm, className: "px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-lg shadow-lg flex items-center gap-2 transition-all active:scale-95" },
                            e(Send, { size: 16 }),
                            "선택 완료 (확인)"
                        ),
                        e('button', { onClick: () => window.close(), className: "p-2 hover:bg-slate-200 rounded-lg text-slate-400" }, e(X, { size: 20 }))
                    )
                ),
                e('div', { className: "p-4 border-b bg-white" },
                    e('div', { className: "relative" },
                        e(Search, { className: "absolute left-3 top-1/2 -translate-y-1/2 text-slate-400", size: 18 }),
                        e('input', {
                            type: "text",
                            placeholder: "인자명, CAS No, 동의어 검색..",
                            className: "input-standard pl-10 h-10",
                            value: search,
                            onChange: (ev) => setSearch(ev.target.value),
                            autoFocus: true
                        })
                    )
                ),
                e('div', { className: "flex-1 overflow-auto scroll-custom" },
                    e('table', { className: "w-full text-left border-collapse" },
                        e('thead', null,
                            e('tr', { className: "bg-slate-50 border-b border-slate-200 text-slate-500 uppercase text-[10px] tracking-wider" },
                                e('th', { className: "px-2 py-3 text-left w-6" }, "#"),
                                e('th', { className: "px-2 py-3 text-left w-36" }, "인자명(국문)"),
                                e('th', { className: "px-2 py-3 text-left w-32" }, "법적명칭"),
                                e('th', { className: "px-2 py-3 text-left w-24" }, "CAS No."),
                                e('th', { className: "px-2 py-3 text-left w-24" }, "채취매체"),
                                e('th', { className: "px-2 py-3 text-left w-32" }, "노출기준"),
                                e('th', { className: "px-2 py-3 text-center w-16" }, "유량"),
                                e('th', { className: "px-2 py-3 text-center w-16" }, "Max"),
                                e('th', { className: "px-2 py-3 text-center w-16" }, "Min"),
                                e('th', { className: "px-2 py-3 text-center w-24" }, "탈착용매"),
                                e('th', { className: "px-2 py-3 text-right w-20" }, "자체여부")
                            )
                        ),
                        e('tbody', { className: "divide-y divide-slate-100 text-[13px]" },
                            loading ? e('tr', null, e('td', { colSpan: "5", className: "px-4 py-10 text-center text-slate-400" }, "데이터 로딩 중...")) :
                                filteredHazards.map((h, idx) => {
                                    const isSelected = selectedHazards.some(sh => sh.common_name === h.common_name);
                                    const limitTextParts = [];
                                    if (h.twa_ppm) limitTextParts.push(`TWA ${h.twa_ppm}ppm`);
                                    else if (h.twa_mg) limitTextParts.push(`TWA ${h.twa_mg}mg/m³`);
                                    
                                    if (h.stel_ppm) limitTextParts.push(`STEL ${h.stel_ppm}ppm`);
                                    else if (h.stel_mg) limitTextParts.push(`STEL ${h.stel_mg}mg/m³`);
                                    
                                    const limitText = limitTextParts.length > 0 ? `노출기준: ${limitTextParts.join(', ')}` : null;

                                    return e('tr', {
                                        key: `${h.common_name}-${idx}`,
                                        className: `hover:bg-indigo-50/50 cursor-pointer transition-colors ${isSelected ? 'bg-indigo-50' : ''}`,
                                        onClick: () => toggleHazard(h),
                                        onDoubleClick: handleConfirm
                                    },
                                        e('td', { className: "px-2 py-2" },
                                            e('div', { className: `w-4 h-4 rounded border flex items-center justify-center transition-colors ${isSelected ? 'bg-indigo-600 border-indigo-600' : 'bg-white border-slate-300'}` },
                                                isSelected && e(Check, { size: 12, className: "text-white" })
                                            )
                                        ),
                                        e('td', { className: "px-2 py-2 font-bold text-slate-800 leading-tight" }, h.common_name),
                                        e('td', { className: "px-2 py-2 text-[10px] text-slate-600 leading-tight" }, h.legal_name || '-'),
                                        e('td', { className: "px-2 py-2 font-mono text-slate-500 text-[10px]" }, h.cas_no),
                                        e('td', { className: "px-2 py-2 text-slate-600 text-[10px]" }, h.sampling_media),
                                        e('td', { className: "px-2 py-2 text-[10px] text-emerald-600 font-semibold leading-tight" }, limitText || '-'),
                                        e('td', { className: "px-2 py-2 text-[10px] text-slate-700 text-center" }, h.flow_rate || '-'),
                                        e('td', { className: "px-2 py-2 text-[10px] text-slate-700 text-center font-bold" }, h.max_volume || '-'),
                                        e('td', { className: "px-2 py-2 text-[10px] text-slate-700 text-center" }, h.min_volume || '-'),
                                        e('td', { className: "px-2 py-2 text-[10px] text-indigo-500 text-center" }, h.desorption_solvent || '-'),
                                        e('td', { className: "px-2 py-2 text-right" },
                                            e('span', { className: `px-2 py-0.5 rounded-full text-[10px] font-black ${h.is_self === '자체분석' ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-500'}` },
                                                h.is_self === '자체분석' ? '자체분석' : '외부의뢰'
                                            )
                                        )
                                    );
                                })
                        )
                    )
                ),
                e('div', { className: "p-4 bg-slate-50 border-t shadow-[0_-4px_6_ -1px_rgba(0,0,0,0.05)]" },
                    e('div', { className: "flex flex-col gap-3" },
                        e('div', { className: "flex flex-wrap gap-2 max-h-24 overflow-y-auto scroll-custom" },
                            selectedHazards.length === 0 ? e('span', { className: "text-sm text-slate-400 italic" }, "선택된 유해인자가 없습니다.") :
                                selectedHazards.map((h, idx) => e('span', { key: `${h.common_name}-${idx}`, className: "inline-flex items-center gap-1 px-3 py-1 bg-indigo-600 text-white text-xs font-bold rounded-full shadow-sm" },
                                    h.common_name,
                                    e('button', { onClick: (ev) => { ev.stopPropagation(); removeHazard(h.common_name); }, className: "hover:bg-indigo-500 rounded-full p-0.5 transition-colors" }, e(X, { size: 12 }))
                                ))
                        ),
                        e('div', { className: "flex items-center justify-between pt-2 border-t border-slate-200" },
                            e('span', { className: "text-xs font-bold text-slate-500" }, "총 ", e('span', { className: "text-indigo-600" }, selectedHazards.length), "건 선택됨")
                        )
                    )
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(SearchApp));
    </script>
</body>

</html>
