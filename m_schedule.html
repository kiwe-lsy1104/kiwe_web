<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>모바일 일정 관리 - KiWE</title>
    <!-- Tailwind CSS (CDN for speed/simplicity as requested) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <!-- React & ReactDOM -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Mobile Specific Overrides */
        body {
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }

        .bottom-sheet {
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Hide scrollbar for clean UI */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <script type="module">
        import { checkAuth } from './js/auth.js';
        checkAuth();
    </script>
</head>

<body class="bg-slate-50 min-h-screen text-slate-800 flex flex-col">

    <!-- Header -->
    <header
        class="bg-white border-b border-slate-200 sticky top-0 z-20 px-4 h-14 flex items-center justify-center shadow-sm">
        <h1 class="text-lg font-black text-indigo-600 flex items-center gap-2">
            <i data-lucide="calendar-check" class="w-5 h-5"></i>
            KiWE Mobile
        </h1>
        <a href="main.html" class="absolute left-4 text-slate-400 p-1">
            <i data-lucide="arrow-left" class="w-6 h-6"></i>
        </a>
    </header>

    <!-- Tab Navigation -->
    <nav class="bg-white border-b border-slate-200 sticky top-14 z-10 flex">
        <button data-target="tabSearch"
            class="tab-btn flex-1 py-3 text-center text-sm font-bold border-b-2 border-indigo-600 text-indigo-600 transition-colors">
            사업장 조회
        </button>
        <button data-target="tabSchedule"
            class="tab-btn flex-1 py-3 text-center text-sm font-bold border-b-2 border-transparent text-slate-400 transition-colors">
            일정 입력
        </button>
        <button data-target="tabVehicle"
            class="tab-btn flex-1 py-3 text-center text-sm font-bold border-b-2 border-transparent text-slate-400 transition-colors">
            차량 일지
        </button>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto no-scrollbar p-4 pb-24">

        <!-- TAB 1: SEARCH -->
        <div id="tabSearch" class="tab-content">
            <div class="relative mb-6">
                <input type="text" id="searchInput" placeholder="사업장명 검색..."
                    class="w-full p-4 pl-12 bg-white border border-slate-200 rounded-2xl shadow-sm text-lg font-bold outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-6 h-6"></i>
                <button onclick="searchBusiness()"
                    class="absolute right-2 top-2 bottom-2 bg-indigo-600 text-white px-4 rounded-xl font-bold shadow-md active:scale-95 transition-transform">
                    검색
                </button>
            </div>

            <div id="searchResultList" class="space-y-3">
                <!-- Search results will appear here -->
                <div class="text-center text-slate-400 mt-10">
                    <i data-lucide="building-2" class="w-12 h-12 mx-auto mb-2 opacity-20"></i>
                    <p class="text-sm">사업장명을 입력하여 검색하세요.</p>
                </div>
            </div>
        </div>

        <!-- TAB 2: SCHEDULE INPUT -->
        <div id="tabSchedule" class="tab-content hidden h-full">
            <div id="scheduleRoot" class="h-full w-full"></div>
        </div>

        <!-- TAB 3: VEHICLE LOG INPUT -->
        <div id="tabVehicle" class="tab-content hidden h-full">
            <div id="vehicleRoot" class="h-full w-full"></div>
        </div>

    </main>

    <!-- Navigation Bottom Sheet Modal -->
    <div id="navModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" onclick="closeNavModal()">
        </div>
        <div
            class="absolute bottom-0 left-0 right-0 bg-white rounded-t-3xl p-6 bottom-sheet translate-y-full shadow-[0_-10px_40px_rgba(0,0,0,0.1)]">
            <div class="flex justify-center mb-6">
                <div class="w-12 h-1.5 bg-slate-200 rounded-full"></div>
            </div>

            <h3 class="text-lg font-black text-slate-800 mb-2">길찾기 앱 선택</h3>
            <p id="navAddressDisplay"
                class="text-sm text-slate-500 mb-6 truncate px-2 border-l-4 border-indigo-500 bg-slate-50 py-2 rounded-r-lg">
                서울시 강남구...
            </p>

            <div class="grid grid-cols-1 gap-3">
                <button id="btnTmap"
                    class="flex items-center justify-center gap-3 p-4 rounded-xl border border-slate-200 font-bold hover:bg-slate-50 active:bg-slate-100 transition-colors">
                    <span class="text-[#E6002D] font-black">T</span> TMAP으로 안내
                </button>
                <button id="btnKakao"
                    class="flex items-center justify-center gap-3 p-4 rounded-xl border border-slate-200 font-bold hover:bg-slate-50 active:bg-slate-100 transition-colors">
                    <span class="text-[#FEE500] font-black bg-slate-900 px-1 rounded text-xs">K</span> 카카오내비로 안내
                </button>
                <button id="btnNaver"
                    class="flex items-center justify-center gap-3 p-4 rounded-xl border border-slate-200 font-bold hover:bg-slate-50 active:bg-slate-100 transition-colors">
                    <span class="text-[#03C75A] font-black">N</span> 네이버지도로 안내
                </button>
            </div>

            <button onclick="closeNavModal()" class="w-full mt-4 p-4 text-slate-400 font-bold">닫기</button>
        </div>
    </div>

    <!-- Logic Script -->
    <script type="module" src="js/m_schedule.js"></script>

</body>

</html>
