<!DOCTYPE html>
<html lang="ko">

<head>
    <script src="js/error_translator.js"></script>
    <meta charset="UTF-8">
    <base href="./">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>중량분석 결과보고서(금속가공유) - KiWE</title>

    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .input-control {
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            padding: 0.5rem 0.75rem;
            font-size: 0.875rem;
            font-weight: 600;
            outline: none;
            transition: all 0.2s;
            background: #f8fafc;
        }

        .input-control:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
            background: white;
        }

        .btn-indigo {
            background: #4f46e5;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .btn-indigo:hover {
            background: #4338ca;
            transform: translateY(-1px);
        }

        .btn-emerald {
            background: #10b981;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .btn-emerald:hover {
            background: #059669;
            transform: translateY(-1px);
        }

        /* Report Specific Styles */
        .report-th {
            border: 1px solid #1e293b;
            padding: 8px 4px;
            text-align: center;
            font-weight: 900;
            color: #1e293b;
        }

        .report-td {
            border: 1px solid #1e293b;
            padding: 4px;
            text-align: center;
            vertical-align: middle;
        }

        /* Hide scrollbars but keep functionality */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }

            .no-print {
                display: none !important;
            }

            .shadow-xl,
            .shadow-2xl {
                box-shadow: none !important;
            }

            body>div {
                background: white !important;
                padding: 0 !important;
            }

            .min-h-screen {
                min-height: none !important;
            }
        }
    </style>
    <!-- Auth Check -->
    <script type="module">
        import { checkAuth } from './js/auth.js';
        checkAuth();
    </script>
</head>

<body class="bg-slate-100 no-scrollbar">
    <div id="root">
        <div class="flex flex-col items-center justify-center h-screen gap-4">
            <div class="w-10 h-10 border-4 border-slate-200 border-t-indigo-600 rounded-full animate-spin"></div>
            <div class="font-bold text-slate-400 animate-pulse">오일분석 시스템 실시간 동기화 중...</div>
        </div>
    </div>
    <script type="module" src="./js/oil_weight.js"></script>
</body>

</html>
