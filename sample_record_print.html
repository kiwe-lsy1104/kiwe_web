<!DOCTYPE html>
<html lang="ko">
<head>
    <script src="js/error_translator.js"></script>
    <meta charset="UTF-8">
    <title>시료채취기록지 - KiWE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif; }

        @media print {
            .no-print { display: none !important; }
            .print-break { page-break-before: always; }
            body { background: white !important; padding: 0 !important; margin: 0 !important; }
            /* 인쇄 시 여백을 시스템 기본값과 맞추기 위해 센터 정렬 */
            .paper { 
                box-shadow: none !important; 
                margin: 0 auto !important; 
                padding: 0 !important; /* 인쇄 시에는 이미 여백이 @page 마진으로 대체됨 */
                width: 100% !important;
                max-width: 280mm !important;
            }
            @page { size: A4 landscape; margin: 8mm 10mm; }
        }

        .paper {
            width: 277mm;
            padding: 10mm;
            margin: 0 auto 20px auto;
            background: white;
            box-shadow: 0 4px 24px rgba(0,0,0,0.12);
            box-sizing: border-box;
        }

        table.rec { border-collapse: collapse; width: 100%; table-layout: fixed; }
        table.rec th, table.rec td {
            border: 1px solid #6b7280;
            padding: 2px 3px;
            font-size: 8.5pt;
            vertical-align: middle;
            line-height: 1.3;
            word-break: keep-all;
        }
        table.rec thead th {
            background: #f3f4f6;
            font-weight: 400;
            text-align: center;
            font-size: 8pt;
            position: relative;
            user-select: none;
            color: #000;
        }
        table.rec tbody td { 
            background: transparent; 
            color: #000; 
            padding: 5px 3px; 
            line-height: 1.8; 
        }
        table.rec tbody td.proc-cell {
            background: transparent;
            font-weight: 400;
            text-align: center;
            font-size: 8pt;
            color: #000;
        }

        /* 시료번호 색상 */
        .sid-s  { color: #1d4ed8; font-weight: 400; }
        .sid-d  { color: #b45309; font-weight: 400; }
        .sid-sb { color: #7c3aed; font-weight: 400; font-size: 7.5pt; }
        .sid-db { color: #9a3412; font-weight: 400; font-size: 7.5pt; }
        .sid-noise { color: #15803d; font-weight: 400; }

        /* 소음 행 */
        tr.row-noise td { background: transparent; }
        tr.row-noise td.proc-cell { background: transparent; }

        /* 리사이즈 핸들 */
        .th-resize-handle {
            position: absolute;
            right: 0; top: 0; bottom: 0;
            width: 6px;
            cursor: col-resize;
            background: transparent;
            z-index: 20;
        }
        .th-resize-handle:hover { background: rgba(59,130,246,0.3); }
        @media print { .th-resize-handle { display: none; } }
    </style>
</head>
<body class="bg-slate-100 min-h-screen py-4">

<!-- ===== 검색 패널 ===== -->
<div class="no-print max-w-5xl mx-auto mb-5 bg-white rounded-2xl shadow-lg p-5 border border-slate-200">
    <div class="flex items-center gap-3 mb-4">
        <div class="w-7 h-7 bg-blue-600 rounded-lg flex items-center justify-center">
            <span class="text-white font-black text-sm">검</span>

<div id="printArea"></div>

<script>
const SUPABASE_URL = 'https://jztrnwchgxymknjvsbkl.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Z8oriOCik8fZlnAMgznUMg_IhmmFQ33';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 컬럼 너비 관리
const COL_KEY = 'KIWE_SAMPLE_PRINT_COL_WIDTHS_V2';
// No, 단위작업공정, 근로자명, 시료번호, 유해인자, 펌프/소음기, 유량, 시작, 종료, 비고
const DEFAULT_WIDTHS = [26, 80, 58, 70, 90, 52, 160, 52, 52, 80];
let colWidths = [...DEFAULT_WIDTHS];

function loadColWidths() {
    try {
        const s = localStorage.getItem(COL_KEY);
        if (s) {
            const p = JSON.parse(s);
            if (Array.isArray(p) && p.length === DEFAULT_WIDTHS.length) colWidths = p;
        }
    } catch { }
}

function saveColWidths() {
    try { localStorage.setItem(COL_KEY, JSON.stringify(colWidths)); } catch { }
}

loadColWidths();

// 날짜 기본값
function getNextWeekday(dateStr) {
    const d = new Date(dateStr);
    d.setDate(d.getDate() + 1);
    const dow = d.getDay();
    if (dow === 0) d.setDate(d.getDate() + 1); // 일요일
    if (dow === 6) d.setDate(d.getDate() + 2); // 토요일
    return d.toISOString().slice(0, 10);
}
const todayStr = new Date().toISOString().slice(0, 10);
document.getElementById('startDate').value = todayStr;
document.getElementById('endDate').value = getNextWeekday(todayStr);

// 유틸
function getTableName(dateStr) {
    const d = new Date(dateStr);
    return `kiwe_sampling_${d.getFullYear()}_${d.getMonth() + 1 <= 6 ? 1 : 2}`;
}
function getTableNames(start, end) {
    const names = new Set();
    const cur = new Date(start), last = new Date(end);
    while (cur <= last) { names.add(getTableName(cur.toISOString().slice(0, 10))); cur.setMonth(cur.getMonth() + 1); }
    return [...names];
}
function getSampleType(sid) {
    if (!sid) return 'other';
    const id = String(sid).toUpperCase();
    if (id.startsWith('SB')) return 'SB';
    if (id.startsWith('DB')) return 'DB';
    if (id.startsWith('S')) return 'S';
    if (id.startsWith('D')) return 'D';
    return 'other';
}
function getSidClass(t) { return { S: 'sid-s', D: 'sid-d', SB: 'sid-sb', DB: 'sid-db' }[t] || ''; }
function esc(s) {
    if (s == null) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function timeShort(val) {
    if (!val) return '';
    let digits = String(val).replace(/\D/g, '');
    if (digits.length === 3) digits = '0' + digits;
    if (digits.length === 4) {
        return digits.substring(0, 2) + ':' + digits.substring(2, 4);
    }
    if (typeof val === 'string' && val.includes(':')) {
        const parts = val.split(':');
        if (parts.length >= 2) {
            return parts[0].padStart(2, '0') + ':' + parts[1].padStart(2, '0');
        }
    }
    return val;
}

// 회사명 정규화
function normCom(name) {
    return (name || '')
        .trim()
        .replace(/\(주\)/gi, '주')
        .replace(/\(재\)/gi, '재')
        .replace(/\(사\)/gi, '사')
        .replace(/\s+/g, ' ')
        .toLowerCase();
}
function buildKey(date, com) { return `${date}__${normCom(com)}`; }

// 사업장 목록 조회
async function loadCompanies() {
    const start = document.getElementById('startDate').value;
    const end   = document.getElementById('endDate').value;
    if (!start || !end) { alert('날짜를 먼저 입력해 주세요.'); return; }
    const btn = document.getElementById('loadComBtn');
    const status = document.getElementById('loadStatus');
    btn.disabled = true; btn.textContent = '조회 중...';
    try {
        const tables = getTableNames(start, end);
        const companies = new Set();
        for (const table of tables) {
            const { data } = await sb.from(table).select('com_name').gte('m_date', start).lte('m_date', end);
            (data || []).forEach(r => r.com_name && companies.add(r.com_name));
        }
        const sel = document.getElementById('comSelect');
        sel.innerHTML = '<option value="">전체 (날짜별 분리)</option>';
        [...companies].sort().forEach(name => {
            const opt = document.createElement('option');
            opt.value = name; opt.textContent = name; sel.appendChild(opt);
        });
        status.textContent = `${companies.size}개 사업장`;
    } catch (err) { status.textContent = '오류: ' + err.message; }
    finally { btn.disabled = false; btn.textContent = '사업장 목록 조회'; }
}

// 출력 미리보기 생성
async function buildPrint() {
    const start     = document.getElementById('startDate').value;
    const end       = document.getElementById('endDate').value;
    const comFilter = document.getElementById('comSelect').value;
    const blankMode = document.getElementById('blankMode').value;
    const statusMsg = document.getElementById('statusMsg');
    if (!start || !end) { alert('날짜를 입력해 주세요.'); return; }

    const btn = document.getElementById('printBtn');
    btn.disabled = true; btn.textContent = '생성 중...';
    statusMsg.style.color = '#2563eb'; statusMsg.textContent = '데이터 불러오는 중...';

    try {
        // 시료 조회
        const tables = getTableNames(start, end);
        let allSamples = [];
        for (const table of tables) {
            let q = sb.from(table).select('*').gte('m_date', start).lte('m_date', end);
            if (comFilter) q = q.eq('com_name', comFilter);
            const { data, error } = await q;
            if (error) throw error;
            allSamples = allSamples.concat(data || []);
        }

        // 입력순 정렬 (DB ID 기준) - 사용자가 대장에 입력한 순서 그대로 노출
        allSamples.sort((a, b) => (Number(a.id) || 0) - (Number(b.id) || 0));


        // 1. 시료 데이터에서 "소음" 분리 및 일반 시료 필터링
        const samplingSamples = [];
        const samplingNoises = [];
        allSamples.forEach(s => {
            if (s.common_name === '소음') {
                samplingNoises.push({
                    ...s,
                    _src: 'sampling',
                    noise_no: s.pump_no // pump_no를 noise_no로 매핑
                });
            } else {
                samplingSamples.push(s);
            }
        });

        // 공시료 필터 (일반 시료만 적용)
        let filteredSamples = samplingSamples;
        if (blankMode === 'exclude') {
            filteredSamples = samplingSamples.filter(s => { const t = getSampleType(s.sample_id); return t === 'S' || t === 'D'; });
        } else if (blankMode === 'only') {
            filteredSamples = samplingSamples.filter(s => { const t = getSampleType(s.sample_id); return t === 'SB' || t === 'DB'; });
        }

        // 2. 소음 데이터 통합 (이제 소음대장 연동 없이 시료채취대장의 소음 데이터만 사용)
        const finalNoises = samplingNoises;

        // 3. 사업장+날짜 그룹화 (정규화된 회사명 키 사용)
        const keyMap = {};
        filteredSamples.forEach(s => {
            const k = buildKey(s.m_date, s.com_name);
            if (!keyMap[k]) keyMap[k] = { com: s.m_date ? s.com_name : '', date: s.m_date, samples: [], noises: [] };
            keyMap[k].samples.push(s);
        });

        // 소음 유입
        finalNoises.forEach(n => {
            const nKey = buildKey(n.m_date, n.com_name);
            if (keyMap[nKey]) {
                keyMap[nKey].noises.push(n);
            } else if (!comFilter || normCom(n.com_name) === normCom(comFilter)) {
                if (!keyMap[nKey]) keyMap[nKey] = { com: n.m_date ? n.com_name : '', date: n.m_date, samples: [], noises: [] };
                keyMap[nKey].noises.push(n);
            }
        });

        const groups = Object.values(keyMap)
            .sort((a, b) => a.date !== b.date ? a.date.localeCompare(b.date) : a.com.localeCompare(b.com));

        if (groups.length === 0) {
            statusMsg.textContent = '조회 결과 없음 (시료 기준)';
            document.getElementById('printArea').innerHTML = '';
            return;
        }

        document.getElementById('printArea').innerHTML = groups.map((g, i) => renderBlock(g, i === 0)).join('');
        attachResizeHandlers();

        const totalSamples = groups.reduce((s, g) => s + g.samples.length, 0);
        const totalNoises  = groups.reduce((s, g) => s + g.noises.length, 0);
        const totalRawNoise = finalNoises.length;
        statusMsg.style.color = '#16a34a';
        statusMsg.textContent = `완료: ${groups.length}개 사업장+날짜 | 시료 ${totalSamples}건 | 소음 ${totalNoises}건`;

    } catch (err) {
        statusMsg.style.color = '#dc2626'; statusMsg.textContent = '오류: ' + err.message;
        console.error(err);
    } finally {
        btn.disabled = false; btn.textContent = '출력 미리보기';
    }
}

// 인터리빙 알고리즘 (소음 1:1, 시료 위에 소음)
function buildProcessGroups(samples, noises) {
    // 1. 모든 행을 하나로 합쳐서 ID순으로 정렬 (전체 리스트)
    const allRows = [
        ...samples.map(s => ({ ...s, _type: 'sample' })),
        ...noises.map(n => ({ ...n, _type: 'noise' }))
    ];
    // ID를 숫자로 변환하여 정확한 순서 보장
    allRows.sort((a, b) => (Number(a.id) || 0) - (Number(b.id) || 0));

    const segments = []; // { proc, points: [] } 형태
    let curSeg = null;
    let curPt = null;
    let seenHazards = new Set();

    allRows.forEach(row => {
        const proc = row.work_process || '(미입력)';
        const worker = row.worker_name || '';
        const hazard = (row._type === 'noise') ? '소음' : (row.common_name || '');

        // [A] 공정 그룹 시작/변경 체크 (연속성 기준)
        if (!curSeg || curSeg.proc !== proc) {
            curSeg = { proc, points: [] };
            segments.push(curSeg);
            curPt = null; // 공정이 바뀌면 포인트도 새로 시작
        }

        // [B] 포인트(근로자별 병합) 시작/변경 체크
        const hazardRepeated = hazard !== '' && seenHazards.has(hazard);
        const workerChanged = curPt && curPt.worker !== worker;

        if (!curPt || workerChanged || hazardRepeated) {
            curPt = { worker, rows: [] };
            curSeg.points.push(curPt);
            seenHazards = new Set();
        }
        
        curPt.rows.push(row);
        if (hazard !== '') seenHazards.add(hazard);
    });

    // 2. 최종 구조로 변환 (병합 정보 _workerSpan 포함)
    return segments.map(seg => {
        const flatRows = [];
        seg.points.forEach(pt => {
            pt.rows.forEach((row, i) => {
                row._workerSpan = (i === 0) ? pt.rows.length : 0;
                // 포인트의 첫 행인 경우에만 근로자명 표시를 위해 보존 (UI 렌더러에서 사용)
                flatRows.push(row);
            });
        });
        return { proc: seg.proc, rows: flatRows };
    });
}

// colgroup HTML 생성
function buildColgroup() {
    return '<colgroup>' + colWidths.map((w, i) =>
        i === colWidths.length - 1 ? '<col>' : `<col style="width:${w}px">`
    ).join('') + '</colgroup>';
}

// 블록 렌더링
function renderBlock(g, isFirst) {
    const procGroups = buildProcessGroups(g.samples, g.noises);

    let tableBody = '';
    let no = 1;
    procGroups.forEach(({ proc, rows }) => {
        rows.forEach((row, i) => {
            const isNoise = row._type === 'noise';
            const isFirst_ = i === 0;

            // 시료번호 칸
            let sidHtml = isNoise
                ? ''
                : `<span class="${getSidClass(getSampleType(row.sample_id))}">${esc(row.sample_id)}</span>`;

            const hazard = isNoise ? `<span class="sid-noise">소음</span>` : esc(row.common_name);
            const pump   = isNoise ? esc(row.noise_no) : esc(row.pump_no);
            const worker = esc(row.worker_name);
            const rowCls = isNoise ? 'row-noise' : '';
            // 근로자명 칸: _workerSpan>0이면 렌더, 0이면 건너뜀(이전 행에 병합됨)
            const workerCell = row._workerSpan === 0
                ? ''
                : row._workerSpan > 1
                    ? `<td style="text-align:center" rowspan="${row._workerSpan}">${worker}</td>`
                    : `<td style="text-align:center">${worker}</td>`;

            tableBody += `<tr class="${rowCls}">
                <td style="text-align:center">${no++}</td>
                ${isFirst_ ? `<td class="proc-cell" rowspan="${rows.length}">${esc(proc)}</td>` : ''}
                ${workerCell}
                <td style="text-align:center">${sidHtml}</td>
                <td>${hazard}</td>
                <td style="text-align:center">${pump}</td>
                <td></td>
                <td style="text-align:center">${timeShort(row.start_time)}</td>
                <td style="text-align:center">${timeShort(row.end_time)}</td>
                ${isFirst_ ? `<td rowspan="${rows.length}"></td>` : ''}
            </tr>`;
        });
    });

    if (!tableBody) tableBody = `<tr><td colspan="10" style="text-align:center;color:#6b7280;padding:8px;">데이터 없음</td></tr>`;

    const breakCls = isFirst ? '' : 'print-break';
    return `
    <div class="${breakCls} paper">
        <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:5px; border-bottom:2.5px solid #1e40af; padding-bottom:5px;">
            <div>
                <div style="font-size:15pt; font-weight:400; color:#000; letter-spacing:-0.5px; margin-bottom:4px;">시 료 채 취 기 록 지</div>
                <div style="font-size:10.5pt; font-weight:400; color:#000; display:flex; gap:16px; align-items:center;">
                    <span><strong>사업장:</strong> ${esc(g.com)}</span>
                    <span style="color:#94a3b8;">|</span>
                    <span><strong>측정일:</strong> ${esc(g.date)}</span>
                    <span style="color:#94a3b8;">|</span>

                    <span style="font-size:8.5pt;color:#15803d;font-weight:900;">■ 소음</span>

                <span>온도&nbsp;<span style="display:inline-block;border-bottom:1px solid #000;min-width:65px;">&nbsp;</span>℃</span>
                <span>습도&nbsp;<span style="display:inline-block;border-bottom:1px solid #000;min-width:65px;">&nbsp;</span>%</span>
            </div>
        </div>
        <div style="font-size:7.5pt;color:#64748b;margin-bottom:4px;font-weight:600;">

        </div>
        <table class="rec">
            ${buildColgroup()}

                <tr>
                    <th>No</th>

                    <th style="font-size:7.5pt;">유량 1차      2차      3차 (L/min)</th>
                    <th>시작시간</th>
                    <th>종료시간</th>
                    <th>비고</th>
                </tr>
            </thead>
            <tbody>${tableBody}</tbody>
        </table>
        <div style="text-align:right;font-size:7pt;color:#94a3b8;margin-top:4px;">
            출력일: ${new Date().toLocaleDateString('ko-KR')} 쨌 한국작업환경평가원(주)
        </div>
    </div>`;
}

// 컬럼 드래그 리사이즈
function attachResizeHandlers() {
    // 첫 번째 테이블의 th들에만 핸들 부착 (모든 테이블에 동시에 적용)
    const firstTable = document.querySelector('table.rec');
    if (!firstTable) return;

    firstTable.querySelectorAll('thead th').forEach((th, idx) => {
        if (idx >= DEFAULT_WIDTHS.length - 1) return; // 마지막(비고) 제외

        // 기존 핸들 제거
        th.querySelector('.th-resize-handle')?.remove();
        const handle = document.createElement('div');
        handle.className = 'th-resize-handle';

        handle.addEventListener('mousedown', ev => {
            ev.preventDefault(); ev.stopPropagation();
            const startX = ev.clientX;
            const startW = colWidths[idx];
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';

            const onMove = mv => {
                const newW = Math.max(20, startW + (mv.clientX - startX));
                colWidths[idx] = Math.round(newW);
                // 모든 테이블의 해당 col 즉시 업데이트
                document.querySelectorAll(`table.rec colgroup col:nth-child(${idx + 1})`).forEach(col => {
                    col.style.width = colWidths[idx] + 'px';
                });
            };

            const onUp = () => {
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
                saveColWidths();
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', onUp);
            };

            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
        });

        th.appendChild(handle);
    });
}

// 이벤트
document.getElementById('loadComBtn').addEventListener('click', loadCompanies);

document.getElementById('excelBtn').addEventListener('click', downloadExcel);

// 엑셀 다운로드 구현
async function downloadExcel() {
    const start     = document.getElementById('startDate').value;
    const end       = document.getElementById('endDate').value;
    const comFilter = document.getElementById('comSelect').value;
    const blankMode = document.getElementById('blankMode').value;
    const statusMsg = document.getElementById('statusMsg');
    
    if (!start || !end) { alert('날짜를 입력해 주세요.'); return; }

    const btn = document.getElementById('excelBtn');
    btn.disabled = true; btn.textContent = '생성 중...';
    statusMsg.style.color = '#2563eb'; statusMsg.textContent = '엑셀 데이터 구성 중...';

    try {
        const tables = getTableNames(start, end);
        let allSamples = [];
        for (const table of tables) {
            let q = sb.from(table).select('*').gte('m_date', start).lte('m_date', end);
            if (comFilter) q = q.eq('com_name', comFilter);
            const { data, error } = await q;
            if (error) throw error;
            allSamples = allSamples.concat(data || []);
        }

        // 입력순 정렬 (DB ID 기준)
        allSamples.sort((a, b) => (Number(a.id) || 0) - (Number(b.id) || 0));

        const samplingSamples = [];
        const samplingNoises = [];
        allSamples.forEach(s => {
            if (s.common_name === '소음') {
                samplingNoises.push({ ...s, _src: 'sampling', noise_no: s.pump_no });
            } else {
                samplingSamples.push(s);
            }
        });

        let filteredSamples = samplingSamples;
        if (blankMode === 'exclude') {
            filteredSamples = samplingSamples.filter(s => { const t = getSampleType(s.sample_id); return t === 'S' || t === 'D'; });
        } else if (blankMode === 'only') {
            filteredSamples = samplingSamples.filter(s => { const t = getSampleType(s.sample_id); return t === 'SB' || t === 'DB'; });
        }

        // 2. 소음 데이터 통합 (시료채취대장 데이터만 사용)
        const finalNoises = samplingNoises;

        const keyMap = {};
        filteredSamples.forEach(s => {
            const k = buildKey(s.m_date, s.com_name);
            if (!keyMap[k]) keyMap[k] = { com: s.com_name, date: s.m_date, samples: [], noises: [] };
            keyMap[k].samples.push(s);
        });

        finalNoises.forEach(n => {
            const nKey = buildKey(n.m_date, n.com_name);
            if (keyMap[nKey]) {
                keyMap[nKey].noises.push(n);
            } else if (!comFilter || normCom(n.com_name) === normCom(comFilter)) {
                if (!keyMap[nKey]) keyMap[nKey] = { com: n.com_name, date: n.m_date, samples: [], noises: [] };
                keyMap[nKey].noises.push(n);
            }
        });

        const groups = Object.values(keyMap)
            .sort((a, b) => a.date !== b.date ? a.date.localeCompare(b.date) : a.com.localeCompare(b.com));

        if (groups.length === 0) {
            alert('다운로드할 데이터가 없습니다.');
            return;
        }

        const wb = XLSX.utils.book_new();
        const wsData = [];
        
        // 헤더 정의
        const headers = ["No", "단위작업공정", "근로자명", "시료번호", "유해인자", "펌프/소음기", "시작시간", "종료시간", "비고"];
        
        groups.forEach(g => {
            // 그룹 타이틀 행
            wsData.push([`[사업장: ${g.com} | 측정일: ${g.date}]`]);
            wsData.push(headers);

            const procGroups = buildProcessGroups(g.samples, g.noises);
            let no = 1;
            procGroups.forEach(({ proc, rows }) => {
                rows.forEach((row, rowIdx) => {
                    const isNoise = row._type === 'noise';
                    const sid = isNoise ? '' : (row.sample_id || '');
                    const hazard = isNoise ? '소음' : (row.common_name || '');
                    const pump = isNoise ? (row.noise_no || '') : (row.pump_no || '');
                    
                    wsData.push([
                        no++,
                        proc,
                        row.worker_name || '',
                        sid,
                        hazard,
                        pump,
                        timeShort(row.start_time),
                        timeShort(row.end_time),
                        "" // 비고 (데이터가 테이블에는 없으므로 비움)
                    ]);
                });
            });
            wsData.push([]); // 그룹 간 빈 줄
        });

        const ws = XLSX.utils.aoa_to_sheet(wsData);
        
        // 스타일 및 너비 (선택 사항)
        ws['!cols'] = [
            { wch: 5 },  // No
            { wch: 20 }, // 공정
            { wch: 12 }, // 근로자명
            { wch: 15 }, // 시료번호
            { wch: 20 }, // 유해인자
            { wch: 12 }, // 펌프
            { wch: 10 }, // 시작
            { wch: 10 }, // 종료
            { wch: 20 }  // 비고
        ];

        XLSX.utils.book_append_sheet(wb, ws, "시료채취기록지");
        
        const fileName = `시료채취기록표_${start}${comFilter ? '_' + comFilter : ''}.xlsx`;
        XLSX.writeFile(wb, fileName);

        statusMsg.style.color = '#16a34a';
        statusMsg.textContent = '엑셀 다운로드 완료';

    } catch (err) {
        alert('엑셀 생성 중 오류: ' + err.message);
        console.error(err);
    } finally {
        btn.disabled = false; btn.textContent = '엑셀 다운로드';
    }
}

document.getElementById('loadComBtn').addEventListener('click', loadCompanies);

    colWidths = [...DEFAULT_WIDTHS];
    saveColWidths();
    document.querySelectorAll('table.rec colgroup col').forEach((col, i) => {
        if (i < DEFAULT_WIDTHS.length - 1) col.style.width = DEFAULT_WIDTHS[i] + 'px';
    });
    // 핸들 재부착
    attachResizeHandlers();
});
