<!DOCTYPE html>
<html lang="ko">

<head>
    <script src="js/error_translator.js"></script>
    <meta charset="UTF-8">
    <base href="./">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https: 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://unpkg.com https://*.lucide.dev https://esm.sh https://cdn.jsdelivr.net http://127.0.0.1:* http://localhost:*; img-src 'self' data: https:; font-src 'self' https: data:;">
    <title>시료대장 관리 - KiWE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        function showError(title, msg) {
            const root = document.getElementById('root');
            if (root) {
                root.innerHTML = `<div style="padding: 40px; text-align: center; font-family: sans-serif; background: #fff1f2; border: 2px solid #fda4af; margin: 20px; border-radius: 12px;">
                    <div style="color: #e11d48; font-size: 24px; font-weight: bold; margin-bottom: 10px;">${title}</div>
                    <div style="color: #4b5563; margin-top: 10px; font-family: monospace; white-space: pre-wrap; font-size: 14px;">${msg}</div>
                    <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 20px; background: #4f46e5; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">새로고침</button>
                    <div style="margin-top: 15px; font-size: 12px; color: #9ca3af;">파일 경로 및 서버 실행 여부를 확인해주세요.</div>
                </div>`;
            }
        }

        window.onerror = function (msg, url, line, col, error) {
            console.error("Global Error:", msg, url, line);
            showError("시스템 로드 오류", `Error: ${msg}\nUrl: ${url}\nLine: ${line}`);
            return false;
        };

        window.addEventListener('unhandledrejection', function (event) {
            console.error("Unhandled Rejection:", event.reason);
            showError("비동기 처리 오류", event.reason?.message || event.reason || "알 수 없는 오류");
        });

        // Catch module loading errors
        window.addEventListener('error', function (event) {
            if (event.target.tagName === 'SCRIPT' && event.target.type === 'module') {
                showError("모듈 로드 실패", `파일을 불러올 수 없습니다: ${event.target.src}\n\n로컬(file://) 환경에서는 보안상 모듈이 작동하지 않을 수 있습니다.\nLive Server 등을 사용하여 실행해주세요.`);
            }
        }, true);
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.css">
    <script src="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        .hot-container {
            background-color: #ffffff !important;
            width: 100%;
            height: 600px;
            overflow: hidden;
            border-radius: 0.75rem;
            border: 1px solid #e2e8f0;
        }

        /* Handsontable Center Alignment */
        .handsontable th {
            vertical-align: middle !important;
            text-align: center !important;
            font-weight: 800 !important;
            background-color: #f8fafc !important;
            color: #475569 !important;
            font-size: 11px !important;
        }

        .handsontable td {
            vertical-align: middle !important;
            text-align: center !important;
        }

        .htCenter {
            text-align: center !important;
        }

        .htMiddle {
            vertical-align: middle !important;
        }

        /* 시료채취대장 격자 및 다크모드 방어 */
        .handsontable {
            background-color: #ffffff !important;
            color: #000000 !important;
        }

        .handsontable td {
            background-color: #ffffff !important;
            padding: 0 4px !important;
            line-height: 24px !important;  /* 행높이 24px로 축소 */
            height: 24px !important;
            color: #000000 !important;
            border-right: 1px solid #e2e8f0 !important;
            border-bottom: 1px solid #e2e8f0 !important;
            vertical-align: middle !important;
            text-align: center !important;
        }

        /* 격자 스타일 */
        .handsontable tbody tr:nth-child(odd) td {
            background-color: #ffffff !important;
        }
        .handsontable td.hot-row-odd {
            background-color: #f1f5f9 !important;
        }

        /* 테이블 헤더 */
        .handsontable th {
            background-color: #f8fafc !important;
            color: #475569 !important;
            border-right: 1px solid #cbd5e1 !important;
            border-bottom: 1px solid #cbd5e1 !important;
            vertical-align: middle !important;
            text-align: center !important;
            height: 24px !important;
            line-height: 1.1 !important;
        }

        /* 테이블 헤더 글자 밀림 방지 */
        .handsontable th .colHeader {
            white-space: normal !important;
            overflow: visible !important;
            text-overflow: unset !important;
            word-break: keep-all;
            line-height: 1.1;
            padding: 1px;
            color: #475569 !important;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        /* 드롭다운/자동완성 팝업 글자 크기 통일 */
        .handsontableDropdownMenu td,
        .handsontableAutocompleteDropdown td,
        .htAutocomplete .htAutocompleteArrow,
        .handsontable .htSelectEditor option,
        .handsontable .htSelectEditor,
        .listbox ul li,
        .ht_master ~ div .handsontable table td {
            font-size: 11px !important;
            font-family: 'Inter', 'Noto Sans KR', sans-serif !important;
            color: #000 !important;
            white-space: nowrap !important;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }

        .tab-active {
            color: #4f46e5;
            border-bottom: 2px solid #4f46e5;
        }

        .card-custom {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid #f1f5f9;
        }

        .input-standard {
            width: 100%;
            padding: 0.5rem 0.75rem;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            outline: none;
            transition: all 0.2s;
        }

        .input-standard:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
            background-color: white;
        }

        .btn-primary {
            background-color: #4f46e5;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary:hover {
            background-color: #4338ca;
        }

        .modal-overlay {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(4px);
        }

        .scroll-custom::-webkit-scrollbar {
            width: 6px;
        }

        .scroll-custom::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        .scroll-custom::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        /* Auto-shrinking text for table cells */
        .auto-shrink {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: clip;
            max-width: 100%;
            cursor: help;
            position: relative;
        }

        @supports (font-size: clamp(8px, 1vw, 14px)) {
            .auto-shrink {
                font-size: clamp(10px, 0.9vw, 14px);
            }
        }

        /* Tooltip for long text */
        .auto-shrink:hover::after {
            content: attr(data-full-text);
            position: absolute;
            left: 0;
            top: 100%;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            white-space: normal;
            max-width: 300px;
            z-index: 1000;
            margin-top: 4px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        /* Text with ellipsis */
        .text-ellipsis {
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
            cursor: help;
            position: relative;
        }

        /* Tooltip for ellipsis text */
        .text-ellipsis:hover::after {
            content: attr(data-full-text);
            position: absolute;
            left: 0;
            top: 100%;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            white-space: normal;
            max-width: 300px;
            z-index: 1000;
            margin-top: 4px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        /* Ensure long text fits in one line with smaller font */
        .fit-text {
            display: inline-block;
            max-width: 100%;
            transform-origin: left center;
        }

        /* Hover effect for rows */
        tr.data-row {
            cursor: pointer;
        }

        tr.data-row:hover {
            background-color: rgba(168, 85, 247, 0.05) !important;
        }

        /* IME Mode Hint for Grid Inputs */
        .handsontable textarea,
        .htCast {
            ime-mode: active !important;
        }
    </style>
    <script type="module">
        import { checkAuth } from './js/auth.js';
        checkAuth();
    </script>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen">
    <div id="root">
        <div
            style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 15px; font-family: sans-serif;">
            <div
                style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%; animation: spin 1s linear infinite;">
            </div>
            <div style="font-weight: bold; color: #475569;">시스템 로딩 중...</div>
            <style>
                @keyframes spin {
                    0% {
                        transform: rotate(0deg);
                    }

                    100% {
                        transform: rotate(360deg);
                    }
                }
            </style>
        </div>
    </div>

    <script type="module" src="./js/sampling.js"></script>
</body>

</html>
