<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Test Verification</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
        }

        .log {
            margin-bottom: 5px;
        }

        .success {
            color: green;
        }

        .error {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h1>Data Entry Verification Test</h1>
    <div id="console"></div>

    <script type="module">
        // 1. Supabase Config (Public Key from search.html)
        const SUPABASE_URL = 'https://jztrnwchgxymknjvsbkl.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Z8oriOCik8fZlnAMgznUMg_IhmmFQ33';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const log = (msg, type = 'info') => {
            const el = document.getElementById('console');
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            el.appendChild(div);
        };

        // 2. Logic to Test (Copied/Adapted from sample.js)
        const getSamplePrefix = (workerName, instrumentName) => {
            const isBlank = ["공시료1", "공시료2", "공시료3", "공시료4"].includes(workerName);
            const isDust = instrumentName === "중량분석";
            if (isDust && isBlank) return "DB";
            if (isDust) return "D";
            if (isBlank) return "SB";
            return "S";
        };

        // 3. Test Data Construction
        const M_DATE = "2026-02-03";
        const COM_NAME = "테스트사업장_BOT";

        // Define Rows based on User Request
        const testRows = [
            { worker: "User1", hazard: "Toluene", inst: "GasChromatograph", pump: "P-1", flow: 1.525 }, // S
            { worker: "User2", hazard: "Toluene", inst: "GasChromatograph", pump: "P-2", flow: 1.533 }, // S
            { worker: "공시료1", hazard: "Toluene", inst: "GasChromatograph", pump: "", flow: 0 },       // SB
            { worker: "공시료2", hazard: "Toluene", inst: "GasChromatograph", pump: "", flow: 0 },       // SB
            { worker: "User3", hazard: "기타광물성분진", inst: "중량분석", pump: "P-1", flow: 1.525 },   // D
            { worker: "User4", hazard: "기타광물성분진", inst: "중량분석", pump: "P-2", flow: 1.533 },   // D
            { worker: "공시료1", hazard: "기타광물성분진", inst: "중량분석", pump: "", flow: 0 },       // DB
            { worker: "공시료2", hazard: "기타광물성분진", inst: "중량분석", pump: "", flow: 0 }        // DB
        ];

        async function runTest() {
            log("Starting Test...");

            // Step A: Verify Prefix Logic
            log("--- Checking Prefix Logic ---");
            const prefixes = testRows.map(r => getSamplePrefix(r.worker, r.inst));
            log(`Derived Prefixes: ${prefixes.join(', ')}`);

            if (prefixes[0] === 'S' && prefixes[2] === 'SB' && prefixes[4] === 'D' && prefixes[6] === 'DB') {
                log("Prefix Logic: PASSED", "success");
            } else {
                log("Prefix Logic: FAILED (Check derived prefixes)", "error");
            }

            // Step B: Insert Sample Data
            log("--- Inserting Sample Data ---");
            const samples = Array.from({ length: 8 });

            // We'll mimic the ID generation simply for the test (mocking the counter)
            // In real app, it queries DB. Here we just assign S26-0001, S26-0002...
            const yearSuffix = M_DATE.split('-')[0].substring(2);
            const ids = { S: 0, SB: 0, D: 0, DB: 0 };

            const payload = testRows.map(r => {
                const prefix = getSamplePrefix(r.worker, r.inst);
                ids[prefix]++;
                const fullPrefix = `${prefix}${yearSuffix}`;
                const id = `${fullPrefix}-${String(ids[prefix]).padStart(4, '0')}`;

                return {
                    sample_id: id,
                    m_date: M_DATE,
                    com_name: COM_NAME,
                    worker_name: r.worker,
                    common_name: r.hazard,
                    instrument_name: r.inst, // Hidden field
                    pump_no: r.pump,
                    work_hour: 8,
                    lunch_time: 60,
                    // Assume other hidden fields are filled
                    hazard_category: r.inst === "중량분석" ? "Dust" : "Organic",
                    sampling_media: r.inst === "중량분석" ? "Filter" : "Tube"
                };
            });

            log(`Payload constructed with ${payload.length} rows.`);

            // Dynamic table name generation
            const getTableName = (dateStr) => {
                if (!dateStr) return 'kiwe_sampling';
                const date = new Date(dateStr);
                const year = date.getFullYear();
                const month = date.getMonth() + 1;
                const halfYear = month <= 6 ? 1 : 2;
                return `kiwe_sampling_${year}_${halfYear}`;
            };

            const tableName = getTableName(M_DATE);
            log(`Using table: ${tableName}`);

            const { data: sampleData, error: sampleError } = await supabase
                .from(tableName)
                .upsert(payload, { onConflict: 'm_date, com_name, sample_id' })
                .select();

            if (sampleError) {
                log(`Sample Insert Failed: ${sampleError.message}`, "error");
            } else {
                log(`Sample Insert Success! Inserted/Updated ${sampleData.length} rows.`, "success");
            }

            // Step C: Insert Flow Data
            log("--- Inserting Flow Data ---");
            const flowPayload = [
                {
                    m_date: M_DATE, pump_no: 'P-1',
                    pre_flow_1: 1.525, pre_flow_2: 1.526, pre_flow_3: 1.524, pre_avg: 1.525,
                    post_flow_1: 1.525, post_flow_2: 1.525, post_flow_3: 1.525, post_avg: 1.525,
                    total_avg: 1.525
                },
                {
                    m_date: M_DATE, pump_no: 'P-2',
                    pre_flow_1: 1.533, pre_flow_2: 1.534, pre_flow_3: 1.532, pre_avg: 1.533,
                    post_flow_1: 1.533, post_flow_2: 1.533, post_flow_3: 1.533, post_avg: 1.533,
                    total_avg: 1.533
                }
            ];

            const { data: flowData, error: flowError } = await supabase
                .from('kiwe_flow')
                .upsert(flowPayload, { onConflict: 'm_date, pump_no' })
                .select();

            if (flowError) {
                log(`Flow Insert Failed: ${flowError.message}`, "error");
            } else {
                log(`Flow Insert Success! Inserted/Updated ${flowData.length} rows.`, "success");
            }

            log("--- Test Complete ---");
        }

        runTest();
    </script>
</body>

</html>
